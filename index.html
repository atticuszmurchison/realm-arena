fxFloat = function(el, txt, color){
  if (INSTANT || !el) return;
  const r = el.getBoundingClientRect();
  const f = document.createElement("div");
  f.className = "floater"; f.textContent = txt; f.style.color = color;
  f.style.left = (r.left + r.width/2 - 14) + "px";
  f.style.top  = (r.top + r.height/2 - 14) + "px";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 1000);
  if (typeof txt==="string" && el.classList){
    if (txt.charAt(0)==="-"){ el.classList.remove("hitshake"); void el.offsetWidth; el.classList.add("hitshake"); setTimeout(()=>el.classList.remove("hitshake"), 470); }
    else if (txt.charAt(0)==="+"){ el.classList.remove("healpulse"); void el.offsetWidth; el.classList.add("healpulse"); setTimeout(()=>el.classList.remove("healpulse"), 770); }
  }
};

function fxAfterRender(prev){
  if (INSTANT || !prev) return;
  document.querySelectorAll(".unit[data-uid]").forEach(el=>{
    const was = prev[el.dataset.uid];
    if (was){
      const now = el.getBoundingClientRect();
      const dx = was.left-now.left, dy = was.top-now.top;
      if (Math.abs(dx)>4 || Math.abs(dy)>4){
        el.style.transition="none"; el.style.transform=`translate(${dx}px,${dy}px)`; el.style.zIndex=8;
        requestAnimationFrame(()=>{
          el.style.transition="transform .3s cubic-bezier(.2,.85,.3,1.05)"; el.style.transform="";
          setTimeout(()=>{ el.style.transition=""; el.style.zIndex=""; }, 340);
        });
      }
    } else {
      el.classList.add("spawnin");
    }
  });
  if (UIS && UIS.justDrawn) UIS.justDrawn.clear();
  turnBanner();
}

        <div class="fcurve">${curve.map((n,i)=> i===0?"" : `<div class="fbar"><div class="fbarfill" style="height:${Math.round(n/maxCurve*100)}%"></div><span>${i}${i===7?"+":""}</span><b>${n||""}</b></div>`).join("")}</div>
        <div class="flist">${listRows.length? listRows.map(([cid,n])=>{ const c=CARDS[cid];
          return `<div class="frow" data-rcid="${cid}"><span class="frc" style="color:${DOM_COLORS[c.domain]}">${c.cost}</span><span class="frn">${c.name}</span><span class="frx">×${n}</span><button class="frminus" data-minus="${cid}">−</button></div>`;
        }).join("") : `<div style="padding:18px; color:#55506a; font-style:italic; font-size:12.5px; text-align:center;">Pick a God, then click cards to add them.</div>`}</div>
      </div>
    </div>
  </div>`;
  $("#fBack").onclick=()=>{ FORGE=null; renderMenu(); };
  $("#fName").oninput=e=>FORGE.name=e.target.value;
  $("#fSave").onclick=saveForge;
  document.querySelectorAll("[data-god]").forEach(el=>{ el.onclick=()=>switchForgeGod(el.dataset.god); el.onmouseenter=()=>setInspect(CARDS[el.dataset.god]); });
  document.querySelectorAll("[data-sort]").forEach(el=> el.onclick=()=>{ FORGE.sort=el.dataset.sort; renderForge(); });
  document.querySelectorAll("[data-omega]").forEach(el=> el.onclick=(e)=>{ e.stopPropagation(); const id=el.dataset.omega; FORGE.omegaFlip[id]=!FORGE.omegaFlip[id]; renderForge(); });
  document.querySelectorAll(".fmini").forEach(el=>{
    const cid=el.dataset.cid; const isOm=el.dataset.omega==="1";
    el.onmouseenter=()=> setInspect(isOm && CARDS[cid].omega ? CARDS[CARDS[cid].omega] : CARDS[cid]);
    el.onclick=()=>{
      if (el.classList.contains("flocked")){ const m=$("#forgeMsg"); if(m){m.textContent="That card is outside your God's domains."; m.style.color="#e5a13a";} return; }
      const n=FORGE.list[cid]||0;
      if (n>=3){ const m=$("#forgeMsg"); if(m){m.textContent="Three copies is the law of the Arena."; m.style.color="#e5a13a";} return; }
      FORGE.list[cid]=n+1; renderForge();
    };
  });
  document.querySelectorAll("[data-minus]").forEach(btn=> btn.onclick=(e)=>{ e.stopPropagation(); const cid=btn.dataset.minus; FORGE.list[cid]--; if(FORGE.list[cid]<=0) delete FORGE.list[cid]; renderForge(); });
  document.querySelectorAll(".frow").forEach(el=> el.onmouseenter=()=> setInspect(CARDS[el.dataset.rcid]));
}

function switchForgeGod(g){
  if (g===FORGE.god) return;
  FORGE.god = g;
  for (const cid of Object.keys(FORGE.list)){
    const d = CARDS[cid].domain;
    if (d!=="neutral" && !GOD_DOMS[g].includes(d)) delete FORGE.list[cid];
  }
  renderForge();
}
window.__forgeFill = function(){
  for (const c of forgePool()){ FORGE.list[c.id] = 3; if (forgeTotal()>=40) break; }
  renderForge();
};

function howtoHTML(){
  return `
  <h3>Goal</h3><p>Reduce the enemy God from <b>30 Health to 0</b>. Only creature Strikes can damage a God — no spell reaches the Throne. Break the line.</p>
  <h3>Your Turn</h3><p><b>Dawn:</b> Essence cap +1 (max 10) and refills. <b>Draw</b> a card. Then act in any order: play cards by paying Essence, and spend <b>4 Commands</b>. Every turn runs on a <b>2:30 hourglass</b> — when it empties, the turn ends on its own.</p>
  <h3>Commands</h3><p><b>March</b> — move a creature up to its Speed. <b>Strike</b> — attack with a creature or armed architecture. <b>Channel</b> — draw a card (once per turn). Each creature may March once and Strike once per turn (Swift creatures March twice).</p>
  <h3>Deploying</h3><p>Creatures deploy to your first two rows; architectures to your first three. Nothing deploys on the Verge (middle row). New units are <b>Bound</b> — they can't act until your next turn (<b>Haste</b> units ignore this).</p>
  <h3>The Attack Triangle</h3><p>Every creature is <b>⚔ Ground</b>, <b>🏹 Ranged</b>, or <b>🕊 Flying</b>. <b>Ground</b> hits adjacent enemies but <b>cannot touch Flyers</b>. <b>Ranged</b> shoots down clear lanes and <b>can hit anything including Flyers</b>, but <b>cannot fire point-blank at a Ground enemy</b> (range 2+) — though it may always shoot an adjacent Flyer. <b>Flying</b> swoops to hit any adjacent unit and can <b>only be hit by Ranged or Flying</b> (and Skywatch towers). So: Flying beats Ground, Ranged beats Flying, Ground beats Ranged. Spells and God powers ignore all of this — they hit anything.</p>
  <h3>Combat</h3><p>Damage is permanent. You <b>Retaliate</b> only if you could legally Strike your attacker back (<b>Piercing</b> stops retaliation). <b>Guard</b> forces adjacent enemies to Strike it first.</p>
  <h3>Movement</h3><p>Most creatures move <b>forward and back only</b> — lanes are commitments. Units with <b>↔ Sidestep</b> also move sideways; <b>Flying</b> moves any direction over anything; <b>Blink</b> teleports anywhere in range. <b>Heavy</b> units can't be shoved by enemy effects. Friendly ground troops may pass through your <b>Gates</b>.</p>
  <h3>Striking the God</h3><p>Melee: stand in the enemy's back row. Ranged: be within Range of their edge with an empty lane between you — a single wall denies the shot.</p>
  <h3>Keywords</h3><p><b>Haste</b> acts the turn it is played — it never enters Bound. <b>Waterwalk</b> crosses Water tiles. <b>Phalanx</b> +1 ATK per adjacent ally. <b>Breakthrough</b> carries kill-overflow to the tile behind (or the God). <b>Blink</b> teleports anywhere within Speed, ignoring walls. <b>Reborn</b> returns once at 1 HP. <b>Venom</b> deals damage every Dusk (stacks cap at 3). <b>Lure</b> drags an enemy in on deploy. <b>Souls</b> feed Toll; <b>Exile</b> (Sentence/Void) removes a card from the game entirely.</p>
  <h3>Healing &amp; Overheal</h3><p>Your God's Health can be mended past its starting 30 \u2014 heals now <b>overheal</b>, so a God at 30 that heals more climbs above it. <b>Rite of Restoration</b> (6 Essence) heals a full <b>+30</b> in one cast, a costly cushion for when the race turns against you.</p>
<h3>Divine Decree (Ultimate)</h3><p>Fill your Essence bar to <b>10</b> and a third God button lights up: a once-per-game <b>Ultimate</b> that spends your entire bar for a match-defining effect — from raising a wall of steel to casting the whole enemy board into the Void. Each fires with its own cinematic. Build toward it.</p>
  <h3>Your God</h3><p>Once per turn, pay Essence (and sometimes Souls) to use your God's <b>Divine Act</b> (button on your God plate). The first time your God drops below 15 Health, their <b>Awakening</b> unlocks — once per game, free, and usually decisive.</p>
  <h3>The Verge (terrain)</h3><p>The contested middle row has terrain, randomized each match. <b>🌊 Water</b> — only Flying units (or one bearing a <b>Wavewalker Charm</b>) may enter that tile; Ground and Ranged are blocked, so a water lane walls off ground advance. <b>⛰ Ridge</b> — high ground: a unit here gets +1 Range (ranged) or +1 ATK (melee). <b>✦ Wellspring</b> — hold it with any creature and gain +1 Essence at your Dawn (up to +2). Fight for the center.</p>
  <h3>Custom Art</h3><p>This build ships with painted art embedded for every illustrated card. For the few cards still using generated art, place image files in an <b>art</b> folder next to this game file, named by card id (e.g. <code>art/pithound.png</code> or .jpg) — the game will use your art automatically. The Art Bible lists every card's exact filename.</p>
  <h3>Glyphs — hidden traps</h3><p>Glyph cards are placed <b>face-down</b> on your tiles (both players see a ◈ rune, only you know which trap it is). When an enemy creature <b>stops</b> on it, it springs: pits deal damage, snares Bind, some are bluffs. Route around them — or call the bluff.</p>
  <h3>Dusk Volley</h3><p>A Ranged creature that still has its Strike when you end your turn <b>fires automatically</b> at the nearest legal enemy creature — a held shot is never wasted. Creatures on Overwatch hold their shot for the enemy turn instead.</p>
<h3>Overwatch</h3><p>A Ranged creature can spend a Command (and its Strike) to <b>hold its shot</b>: the first enemy that moves into its sights — on any turn — gets shot automatically. Archers on Overwatch control space; look for the ⌖ badge.</p>
  <h3>Command Banking</h3><p>End your turn with unspent Commands and you <b>bank one</b> for next turn (5 total). Sometimes patience is the strongest play.</p>
  <h3>Leaving a Match</h3><p>Hitting your browser's <b>Back</b> button or swiping back on a touchscreen mid-match asks you to confirm first \u2014 so a stray gesture never dumps you out of a duel. Refreshing or closing the tab warns you too.</p>
<h3>Table Talk (chat)</h3><p>During an online duel a <b>Table Talk</b> box sits in the lower-left corner \u2014 type to trash-talk or coordinate with your opponent. Messages go straight between your two computers; hit the \u2013 to tuck it away.</p>
<h3>Online Duels</h3><p>From the menu pick <b>Online · vs a Friend</b> — each player opens their own copy of this game (or the same web link) on their own computer. Both choose a Legion; one clicks <b>Create Match</b> and reads the 5-letter code to the other, who enters it and hits <b>Join</b>. The host's Arena choice is used. Turns pass across the wire automatically — your hand stays on your screen only. Both players need internet.</p>
<h3>The Fallen</h3><p>Your destroyed cards go to <b>the Fallen</b> (your graveyard) — click the <b>⚰</b> counter on either God plate to browse it. Cards like <b>Rite of Return</b>, <b>Gravebishop</b>, and <b>Reclamation Rite</b> (and Toll's Awakening) let you <b>choose</b> which fallen creature to bring back — a picker opens so you pick, instead of it grabbing one for you.</p>
  <h3>Glory & Omega</h3><p>A creature that kills — <b>or Strikes the enemy God</b> — earns <b>Glory ✦</b>. At 3 Glory an <b>Ascendant</b> creature may transform at Dawn into its <b>Omega</b> form — fully healed, ready to act. Others gain +1/+1 (<i>Battle-Hardened</i>).</p>`;
}

function startGame(){
  if (MENU.mode==="online") return;
  NET.leave();
  MODE = MENU.mode;
  ARENA_CHOICE = ARENAS.find(a=>a.key===MENU.arena) || ARENAS[0];
  const d0 = deckByKey(MENU.deck);
  const d1 = (MENU.opp && MENU.opp!=="auto") ? deckByKey(MENU.opp)
           : (d0.god==="godKaerok" ? DECKS.gale : DECKS.crucible);
  const names = MODE==="bot" ? ["You", "Arena Bot"] : ["Player 1", "Player 2"];
  newGame(MODE, d0, d1, names);
  G.hideHands = MENU.hideHands;
  VIEWER = 0;
  resetSel();
  renderAll();
}

    Math.floor((window.innerHeight - 245) / (7*0.82 + 0.6)),
    Math.floor((window.innerWidth - 460) / 5.2),
    112));
  document.documentElement.style.setProperty("--ts", ts+"px");
}

function boardHTML(){
  const rowsOrder = VIEWER===0 ? [...Array(ROWS).keys()].reverse() : [...Array(ROWS).keys()];
  let html = "";
  const hl = computeHighlights();
  for (const r of rowsOrder){
    for (let c=0;c<COLS;c++){
      const u = unitAt(c,r);
      const key = c+","+r;
      const cls = ["tile"];
      let terr = "";
      if (r===VERGE){ cls.push("verge"); const tt=G.terrain[c]; if (tt && tt!=="plain"){ cls.push(tt); terr = tt; } }
      else {
        const mineSide = rowFromEdge(VIEWER, r) < VERGE;
        cls.push(mineSide ? "mine-zone" : "foe-zone");
        if (mineSide){
          if (inCreatureZone(VIEWER, r)) cls.push("dz-creature");
          else if (inArchZone(VIEWER, r)) cls.push("dz-arch");
        }
      }
      if (hl.deploy.has(key)) cls.push("deployok");
      if (hl.move.has(key)) cls.push("moveok");
      if (hl.strike.has(key)) cls.push("strikeok");
      if (hl.spell.has(key)) cls.push("spellok");

      const tIcon = terr ? `<span class="terr" title="${terr==='water'?'Water — only Flying/Blink may enter':terr==='ridge'?'Ridge — high ground: +1 Range/ATK':'Wellspring — hold it for +1 Essence at Dawn'}">${terr==='water'?'🌊':terr==='ridge'?'⛰':'✦'}</span>`:"";
      const rlab = c===0 ? `<span class="ranklab">${rowFromEdge(VIEWER,r)+1}</span>` : "";
      html += `<div class="${cls.join(' ')}" data-c="${c}" data-r="${r}">${rlab}${tIcon}${gIcon}${u ? unitHTML(u) : ""}</div>`;
    }
  }
  return html;
}

function computeHighlights(){
  const deploy = new Set(), move = new Set(), strike = new Set(), spell = new Set();
  if (G.over || BOT_BUSY || VIEWER!==G.turn) return {deploy,move,strike,spell};
  const p = curP();
  if (UIS.freeMove){
    for (const [c,r] of reachableFly(UIS.freeMove.unit, UIS.freeMove.n)) if (canStand(UIS.freeMove.unit,c,r)) move.add(c+","+r);
    return {deploy,move,strike,spell};
  }
  if (UIS.sacBuff){
    for (const t of allUnits()) if (t.owner===p.i && !t.isArch && t.uid!==UIS.sacBuff.targetUid) spell.add(t.col+","+t.row);
    return {deploy,move,strike,spell};
  }
  if (UIS.refreshPick){
    for (const t of allUnits()) if (t.owner===p.i && !t.isArch && !t.bound) spell.add(t.col+","+t.row);
    return {deploy,move,strike,spell};
  }
  if (UIS.ultVenge){
    for (const t of allUnits()) if (t.owner!==p.i && !t.isArch) spell.add(t.col+","+t.row);
    return {deploy,move,strike,spell};
  }
  if (UIS.ascendKill){
    for (const t of allUnits()) if (t.owner!==p.i && !t.isArch && hpOf(t)<=UIS.ascendKill.n) spell.add(t.col+","+t.row);
    return {deploy,move,strike,spell};
  }
  if (UIS.deployFx){
    for (const t of UIS.deployFx.targets.filter(t=>t && t.col!=null)) spell.add(t.col+","+t.row);
    return {deploy,move,strike,spell};
  }
  if (UIS.mode && UIS.mode.startsWith("godact-")){
    const m = UIS.mode.slice(7);
    if (m==="gust2"){ for (const [c,r] of reachableFly(UIS.actUnit,2)) move.add(c+","+r); }
    else if (m==="displace2"){ for (const [dc,dr] of [[0,1],[0,-1],[1,0],[-1,0]]){ const nc=UIS.actUnit.col+dc, nr=UIS.actUnit.row+dr; if (canStand(UIS.actUnit,nc,nr)) move.add(nc+","+nr); } }
    else if (m==="sprout"){ for (const [c,r] of godActTargets(p,"sprout")) deploy.add(c+","+r); }
    else { for (const t of godActTargets(p,m)) spell.add(t.col+","+t.row); }
    return {deploy,move,strike,spell};
  }
  if (UIS.mode==="deploy" && UIS.handIdx!=null){
    for (const [c,r] of legalDeployTiles(p, p.hand[UIS.handIdx])) deploy.add(c+","+r);
  }
  if (UIS.mode==="glyphdeploy" && UIS.handIdx!=null){
    for (const [c,r] of glyphTiles(p)) deploy.add(c+","+r);
  }
  if ((UIS.mode==="spell"||UIS.mode==="artifact") && UIS.handIdx!=null){
    const st = spellTargets(p, p.hand[UIS.handIdx]);
    for (const t of st.units) spell.add(t.col+","+t.row);
  }
  if (UIS.unit && p.cmds>0){
    const u = UIS.unit;
    if (!u.bound && !u.isArch && u.marched < (hasKw(u,"swift")?2:1)){
      for (const [c,r] of reachableTiles(u)) move.add(c+","+r);
    }
    if (!u.bound && !u.struck && (atkOf(u)>0)){
      const st = legalStrikeTargets(u);
      for (const t of st.units) strike.add(t.col+","+t.row);
    }
  }
  return {deploy,move,strike,spell};
}

function reachableFly(u, n){
  const seen = new Set([u.col+","+u.row]);
  let frontier = [[u.col,u.row]];
  const out = [];
  for (let step=0; step<n; step++){
    const next = [];
    for (const [c,r] of frontier){
      for (const [dc,dr] of [[0,1],[0,-1],[1,0],[-1,0]]){
        const nc=c+dc, nr=r+dr;
        if (nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
        const key=nc+","+nr;
        if (seen.has(key)) continue;
        seen.add(key); next.push([nc,nr]);
        if (!unitAt(nc,nr)) out.push([nc,nr]);
      }
    }
    frontier = next;
  }
  return out;
}

function godActTargets(p, m){
  const A = allUnits();
  switch(m){
    case "healArch": return A.filter(u=>u.owner===p.i && u.isArch && u.dmg>0);
    case "gust": return A.filter(u=>u.owner===p.i && !u.isArch && hasKw(u,"flying") && !u.bound);
    case "damageAny": return A.filter(u=>!u.isArch && u.owner!==p.i);
    case "damageFriendDraw": return A.filter(u=>u.owner===p.i && !u.isArch);
    case "displace": return A.filter(u=>!u.isArch && !(u.owner!==p.i && hasKw(u,"heavy")));
    case "refreshFriend": return A.filter(u=>u.owner===p.i && !u.isArch && !u.bound);
    case "exileWeak": return A.filter(u=>!u.isArch && hpOf(u)<=2);
    case "venomAny": return A.filter(u=>!u.isArch && u.owner!==p.i);
    case "markEnemy": return A.filter(u=>u.owner!==p.i && !u.isArch);
    case "sprout": return legalDeployTiles(p, "sapling");
  }
  return [];
}
function onGodAct(){
  const p = curP(); const act = p.god.act;
  if (p.actUsed || p.essence < act.cost) return;
  if (act.soulCost && p.souls < act.soulCost){ flashHint("Not enough Souls for "+act.name+"."); return; }
  resetSelKeepInspect();
  sfx("godact");
  const tg = godActTargets(p, act.mode);
  if (!tg.length){ flashHint("No legal target for "+act.name+"."); return; }
  UIS.mode = "godact-"+act.mode;
  renderAll();
}
function payAct(p){ const act=p.god.act; p.essence-=act.cost; if (act.soulCost) p.souls-=act.soulCost; p.actUsed=true; }
function handleGodActClick(p, m, c, r, u, hl){
  const key=c+","+r;
  if (m==="gust"){ if (u&&hl.spell.has(key)){ UIS.actUnit=u; UIS.mode="godact-gust2"; renderAll(); } return; }
  if (m==="gust2"){ if (hl.move.has(key)){ payAct(p); moveUnit(UIS.actUnit,c,r); log(`${p.god.name}'s Gust carries <b>${CARDS[UIS.actUnit.cardId].name}</b>.`,"hl"); resetSel(); renderAll(); } return; }
  if (m==="displace"){ if (u&&hl.spell.has(key)){ UIS.actUnit=u; UIS.mode="godact-displace2"; renderAll(); } return; }
  if (m==="displace2"){ if (hl.move.has(key)){ payAct(p); moveUnit(UIS.actUnit,c,r); log(`${p.god.name} Displaces <b>${CARDS[UIS.actUnit.cardId].name}</b>.`,"hl"); resetSel(); renderAll(); } return; }
  if (m==="sprout"){ if (hl.deploy.has(key)){ payAct(p); summonToken(p,"sapling",c,r); fxFloat(tileEl(c,r),"+Sapling","#5abf5f"); log(`${p.god.name} Sprouts a Sapling.`,"hl"); resetSel(); renderAll(); } return; }
  if (!u || !hl.spell.has(key)) return;
  payAct(p);
  if (m==="healArch"){ u.dmg=Math.max(0,u.dmg-2); fxFloat(tileEl(c,r),"+2","#5abf5f"); log(`${p.god.name} reforges <b>${CARDS[u.cardId].name}</b>.`,"hl"); }
  else if (m==="damageAny"){ const n=p.god.act.n||1; log(`${p.god.name} Reaps <b>${CARDS[u.cardId].name}</b> for ${n}.`,"hl"); dealDamage(u,n,null,"#a05bd8"); }
  else if (m==="damageFriendDraw"){ log(`${p.god.name} exacts the Blood Price.`,"hl"); dealDamage(u,1,null,"#e5543a"); drawCard(p); }
  else if (m==="exileWeak"){ log(`${p.god.name} Absolves <b>${CARDS[u.cardId].name}</b>.`,"hl"); exileUnit(u); }
  else if (m==="venomAny"){ u.venom=Math.min(3,(u.venom||0)+1); fxFloat(tileEl(c,r),"☣","#5abf5f"); log(`${p.god.name} Infests <b>${CARDS[u.cardId].name}</b>.`,"hl"); }
  else if (m==="markEnemy"){ p.markedUid=u.uid; fxFloat(tileEl(c,r),"◎","#e5543a"); log(`${p.god.name} Marks <b>${CARDS[u.cardId].name}</b>.`,"hl"); }
  else if (m==="refreshFriend"){ u.marched=0; fxFloat(tileEl(c,r),"↻","#35c3e8"); log(`${p.god.name}'s War Cry frees <b>${CARDS[u.cardId].name}</b> to March again.`,"hl"); }
  resetSel(); renderAll();
}

function threatTiles(u){
  const out = new Set();
  const at = atkType(u);
  const positions = [[u.col,u.row]];
  if (!u.bound) for (const p of reachableTiles(u)) positions.push(p);
  for (const [c,r] of positions){
    if (at==="ground" || at==="flying"){
      for (const [dc,dr] of [[0,1],[0,-1],[1,0],[-1,0]]){ const nc=c+dc,nr=r+dr; if (nc>=0&&nc<COLS&&nr>=0&&nr<ROWS) out.add(nc+","+nr); }
    } else {
      const R = rangeOf(u);
      for (const [dc,dr] of [[0,1],[0,-1],[1,0],[-1,0]]){
        for (let d=1; d<=R; d++){
          const nc=c+dc*d, nr=r+dr*d;
          if (nc<0||nc>=COLS||nr<0||nr>=ROWS) break;
          out.add(nc+","+nr);
          const occ = unitAt(nc,nr);
          if (occ && occ.uid!==u.uid) break;   // line stops at first body
        }
      }
    }
  }
  return out;
}
function clearThreat(){ document.querySelectorAll(".tile.threat").forEach(t=>t.classList.remove("threat")); }
function paintThreat(u){
  clearThreat();
  for (const key of threatTiles(u)){
    const [c,r] = key.split(",");
    const el = document.querySelector(`.tile[data-c="${c}"][data-r="${r}"]`);
    if (el) el.classList.add("threat");
  }
}
function strikePreview(att, t){

  if (!kills && !t.isArch && !effPiercing(att) && canStrike(t, att)) txt += ` · retaliation ${strikeDamage(t, att)}`;
  if (hasKw(att,"venom") && !t.isArch) txt += " · ☣";
  return txt;
}

function onTileClick(c,r,el){
  if (G.over || BOT_BUSY || VIEWER!==G.turn) return;
  const p = curP();
  const u = unitAt(c,r);
  const key = c+","+r;
  const hl = computeHighlights();

  if (UIS.freeMove){
    if (hl.move.has(key)){
      const fu = UIS.freeMove.unit;
      log(`${CARDS[fu.cardId].name} rides the Tailwind.`);
      moveUnit(fu, c, r);
      UIS.freeMove=null; resetSel(); renderAll();
    }
    return;
  }
  if (UIS.sacBuff){
    if (u && u.owner===p.i && !u.isArch && u.uid!==UIS.sacBuff.targetUid){
      log(`…sacrifices <b>${CARDS[u.cardId].name}</b>.`);
      destroyUnit(u, null);
      const b2 = allUnits().find(x=>x.uid===UIS.sacBuff.targetUid);
      if (b2){ b2.bAtk+=UIS.sacBuff.atk; b2.bHp+=UIS.sacBuff.hp; b2.tempBreak=true; fxFloat(tileEl(b2.col,b2.row),"+"+UIS.sacBuff.atk+"/+"+UIS.sacBuff.hp,"#e5543a"); }
      UIS.sacBuff=null; resetSel(); renderAll();
    }
    return;
  }
  if (UIS.refreshPick){
    if (u && u.owner===p.i && !u.isArch && !u.bound){
      u.marched=0; fxFloat(tileEl(c,r),"↻","#35c3e8"); log(`…<b>${CARDS[u.cardId].name}</b> answers the trumpet.`);
      UIS.refreshPick.left--;
      if (UIS.refreshPick.left<=0){ UIS.refreshPick=null; resetSel(); }
      renderAll();
    }
    return;
  }
  if (UIS.ultVenge){ resolveUltVenge(u); return; }
  if (UIS.ascendKill){
    if (u && u.owner!==p.i && !u.isArch && hpOf(u)<=UIS.ascendKill.n){
      const src = allUnits().find(x=>x.uid===UIS.ascendKill.srcUid) || null;
      log(`…<b>${CARDS[u.cardId].name}</b> is struck down.`);
      destroyUnit(u, src);
      UIS.ascendKill=null; resetSel(); renderAll();
    }
    return;
  }
  if (UIS.deployFx){
    if (u && UIS.deployFx.targets.includes(u)){
      if (UIS.deployFx.stage==="sac"){
        log(`…sacrifices <b>${CARDS[u.cardId].name}</b>.`);
        destroyUnit(u, null);
        const dmgT = deployEffectTargets(p, UIS.deployFx.cd);
        if (dmgT && dmgT.length){ UIS.deployFx = {cd:UIS.deployFx.cd, targets:dmgT, unit:UIS.deployFx.unit, stage:"dmg"}; renderAll(); }
        else { UIS.deployFx=null; resetSel(); renderAll(); }
      } else {
        applyDeployEffect(p, UIS.deployFx.cd, u);
        UIS.deployFx=null; resetSel(); renderAll();
      }
    }
    return;
  }
  if (UIS.mode && UIS.mode.startsWith("godact-")){ handleGodActClick(p, UIS.mode.slice(7), c, r, u, hl); return; }
  if (UIS.mode==="glyphdeploy" && hl.deploy.has(key)){
    placeGlyph(p, UIS.handIdx, c, r); resetSel(); renderAll(); return;
  }
  if (UIS.mode==="deploy" && hl.deploy.has(key)){
    const cd = CARDS[p.hand[UIS.handIdx]];
    const nu = deploy(p, UIS.handIdx, c, r);
    resetSel();
    if (cd.deploy && cd.deploy.kind==="sacrificeDamage"){
      const dmgT = deployEffectTargets(p, cd);
      const sacT = allUnits().filter(x=>x.owner===p.i && !x.isArch);
      if (dmgT && dmgT.length && sacT.length){ UIS.deployFx = {cd, targets:sacT, unit:nu, stage:"sac"}; }
    } else {
      const fxT = deployEffectTargets(p, cd);
      if (fxT && fxT.length){ UIS.deployFx = {cd, targets:fxT, unit:nu}; }
    }
    renderAll(); return;
  }
  if (UIS.mode==="spell" && u && hl.spell.has(key)){
    castSpell(p, UIS.handIdx, u); resetSel(); renderAll(); return;
  }
  if (UIS.mode==="artifact" && u && hl.spell.has(key)){
    equipArtifact(p, UIS.handIdx, u); resetSel(); renderAll(); return;
  }
  if (UIS.unit){
    if (hl.move.has(key)){ march(UIS.unit, c, r); if (curP().cmds<=0) resetSel(); renderAll(); return; }
    if (u && hl.strike.has(key)){ strike(UIS.unit, u); resetSel(); renderAll(); return; }
  }
  // select own unit
  if (u && u.owner===G.turn){
    resetSelKeepInspect(); UIS.unit = u; setInspect(CARDS[u.cardId], u); renderAll(); return;
  }
  resetSel(); renderAll();
}

function onChannel(){
  const p = curP();
  if (p.cmds<1 || p.channeled) return;
  p.cmds--; p.channeled = true;
  if (p.deck.length===0){ gameOver(1-p.i); renderAll(); return; }
  drawCard(p); log(`${p.name} channels the Soulwell (+1 card).`); sfx("channel");
  resetSel(); renderAll();
}

function onEndTurn(){

    combatLine = `<div style="padding:0 10px 4px; font-size:10.5px; color:#9fb0c8; line-height:1.5;"><b style="color:#d9c48a">${atype}</b> — ${canhit}.<br><span style="color:#8a94a8">Move: ${mv}.</span></div>`;

/* ============================ ARENA BOT ============================ */
async function botTakeTurn(pi){
  if (G.over) return;
  const gen = G.gen;
  const dead = () => !G || G.gen!==gen || G.over;
  BOT_BUSY = true; renderAll();
  if (botMaybeUlt(G.players[pi])){ renderAll(); await sleep(750); }
  await sleep(500);
  if (!G || G.gen!==gen){ return; }
  const p = G.players[pi];

  // 1. ascend + awaken
  for (const u of [...G.pendingAscends]){ if (dead()) return; if (allUnits().includes(u)){ ascend(u); renderAll(); await sleep(600); } }
  if (dead()) return;
  if (p.awakenReady && !p.awakened && botWantsAwaken(p)){ performAwaken(p); renderAll(); await sleep(700); }
  if (dead()) return;

  // 2. play cards (loop until nothing playable)
  let guard = 0;
  while (guard++ < 20 && !dead()){
    const idx = botPickCard(p);
    if (idx===-1) break;
    botPlayCard(p, idx);
    renderAll(); await sleep(420);
  }
  if (dead()) return;

  // 2b. divine act
  if (!dead() && botTryAct(p)){ renderAll(); await sleep(420); }
  if (dead()) return;

  // 3. spend commands
  guard = 0;
  while (p.cmds>0 && guard++<12 && !dead()){
    if (botBestStrike(p)) { renderAll(); await sleep(430); continue; }
    if (botBestMarch(p))  { renderAll(); await sleep(330); continue; }
    if (!p.channeled && p.hand.length<6){ onBotChannel(p); renderAll(); await sleep(300); continue; }
    const owr = allUnits().find(u=>u.owner===p.i && !u.isArch && atkType(u)==="ranged" && !u.bound && !u.struck && !u.overwatch
       && allUnits().some(e=>e.owner!==p.i && !e.isArch && dist(u.col,u.row,e.col,e.row)<=rangeOf(u)+2));
    if (owr && p.cmds>0){ p.cmds--; owr.struck=true; owr.overwatch=true; log(`⌖ <b>${CARDS[owr.cardId].name}</b> takes Overwatch.`, "hl"); renderAll(); await sleep(250); continue; }
    break;
  }
  if (!G || G.gen!==gen) return;

  BOT_BUSY = false;
  if (!G.over){
    endTurn();
    renderAll();
    if (MODE==="hotseat"){ VIEWER = G.turn; }
  } else renderAll();
}
function onBotChannel(p){ p.cmds--; p.channeled=true; if (p.deck.length){ drawCard(p); log(`${p.name} channels the Soulwell.`);} }

function botPickCard(p){
  // returns hand index to play, or -1
  let best=-1, bestScore=-1;
  for (let i=0;i<p.hand.length;i++){
    const cd = CARDS[p.hand[i]];
    if (cd.cost > p.essence) continue;
    let s = -1;
    if (cd.type==="creature"){ if (legalDeployTiles(p,cd.id).length) s = 50 + cd.cost*4; }
    else if (cd.type==="arch"){
      const need = botWallNeed(p);
      if (legalDeployTiles(p,cd.id).length) s = (cd.dusk? 30 : (need? 45 : 8)) + cd.cost;
    }
    else if (cd.type==="spell"){
      const v = botSpellValue(p, cd);
      if (v>0) s = v;
    }
    else if (cd.type==="artifact"){
      if (allUnits().some(u=>u.owner===p.i && !u.isArch)) s = 22;
    }
    else if (cd.type==="glyph"){
      if (glyphTiles(p).length) s = 14 + cd.cost*2;
    }
    if (s>bestScore){ bestScore=s; best=i; }
  }
  return best;
}
function botWallNeed(p){
  // enemy creature past the verge heading our way?
  return allUnits().some(u=>u.owner!==p.i && !u.isArch && rowFromEdge(p.i,u.row)<=3);
}
function botSpellValue(p, cd){
  const eff = cd.effect || (cd.id==="soulbolt"?{kind:"damage",n:2}: cd.id==="sunder"?{kind:"destroyArch"}:null);
  if (!eff) return 0;
  const enemies = allUnits().filter(u=>u.owner!==p.i && !u.isArch);
  const friends = allUnits().filter(u=>u.owner===p.i && !u.isArch && !u.bound);
  const k = eff.kind;
  if (k==="damage"||k==="precision"||k==="damageDisplace") return enemies.some(u=>hpOf(u)<=(eff.n||2)) ? 60 : (enemies.length? 22 : 0);
  if (k==="damageExile") return enemies.length? 45 : 0;
  if (k==="exile"){ const cap=cd.thpMax!=null?cd.thpMax:2; return enemies.some(e=>hpOf(e)<=cap)? 55 : 0; }
  if (k==="banish") return enemies.length? 40 : 0;
  if (k==="destroyArch"){ return allUnits().some(u=>u.owner!==p.i && u.isArch)? 40 : 0; }
  if (k==="buff"||k==="buffColumn"||k==="tempCharge") return friends.length? 24 : 0;
  if (k==="sacrificeBuff") return friends.length>=2? 26 : 0;
  if (k==="aoeEnemies") return enemies.length>=3 ? 75 : (enemies.length? 12:0);
  if (k==="refreshTwo") return friends.filter(f=>f.marched>0).length>=1? 24 : 0;
  if (k==="healGod") return (START_HP - p.hp) >= 12 ? (START_HP - p.hp)*3 : 0;
  if (k==="freeMove") return 0;
  return enemies.length? 15 : 0;
}
function botPlayCard(p, idx){
  const cd = CARDS[p.hand[idx]];
  if (cd.type==="creature" || cd.type==="arch"){
    const tiles = legalDeployTiles(p, cd.id);
    let best=null, bs=-1e9;
    for (const [c,r] of tiles){
      let s = 0;
      const fwd = rowFromEdge(p.i, r); // 0 back, 1/2 forward
      if (cd.type==="creature"){ s += fwd*6 + (2 - Math.abs(2-c)); if (!colBlockedForP(p.i,c)) s += 8; }
      else {
        // walls toward threatened lanes, front row
        const threat = allUnits().filter(u=>u.owner!==p.i && !u.isArch && u.col===c).length;
        s += threat*20 + fwd*4;
        if (cd.dusk) s = 10 + (allUnits().filter(u=>u.owner===p.i && Math.abs(u.col-c)<=1).length)*4 - fwd;
      }
      if (s>bs){ bs=s; best=[c,r]; }
    }
    const nu = deploy(p, idx, best[0], best[1]);
    // targeted deploy effect (auto kinds already applied inside deploy())
    if (cd.deploy && deployEffectTargets(p, cd)){
      const t = deployEffectTargets(p, cd) || [];
      let pick=null; const k=cd.deploy.kind;
      if (k==="healUnit") pick = t.sort((a,b)=>b.dmg-a.dmg)[0];
      else if (k==="buffUnit") pick = t.filter(x=>x.uid!==nu.uid).sort((a,b)=>atkOf(b)-atkOf(a))[0] || t[0];
      else if (k==="damageCreature"){ const en=t.filter(x=>x.owner!==p.i); pick = en.find(x=>hpOf(x)<=cd.deploy.n) || en.sort((a,b)=>atkOf(b)-atkOf(a))[0]; }
      else if (k==="exileWeak"){ pick = t.filter(x=>x.owner!==p.i).sort((a,b)=>atkOf(b)-atkOf(a))[0]; }
      else if (k==="sacrificeDamage"){ pick = t.find(x=>hpOf(x)<=cd.deploy.n) || t.sort((a,b)=>atkOf(b)-atkOf(a))[0];
        if (pick){ const sac = allUnits().filter(x=>x.owner===p.i && !x.isArch).sort((a,b)=>(atkOf(a)+hpOf(a))-(atkOf(b)+hpOf(b)))[0];
          if (sac){ log(`…sacrifices <b>${CARDS[sac.cardId].name}</b>.`); destroyUnit(sac, null); } } }
      if (pick && allUnits().includes(pick)) applyDeployEffect(p, cd, pick);
    }
  }
  else if (cd.type==="spell"){
    const t = cd.target;
    const enemies = allUnits().filter(u=>u.owner!==p.i && !u.isArch);
    const friends = allUnits().filter(u=>u.owner===p.i && !u.isArch);
    let target = null;
    if (t==="none"){ castSpell(p, idx, null); return; }
    if (t==="anyArch"){ target = allUnits().filter(u=>u.owner!==p.i && u.isArch).sort((a,b)=>maxHpOf(b)-maxHpOf(a))[0]; }
    else if (t==="friendCreature"||t==="friendUnit"){ target = friends.filter(f=>!f.token).sort((a,b)=>atkOf(b)-atkOf(a))[0] || friends[0]; }
    else { // anyCreature / enemyCreature -> best enemy (respect thpMax)
      let pool = enemies;
      if (cd.thpMax!=null) pool = pool.filter(e=>hpOf(e)<=cd.thpMax);
      const n = (cd.effect&&cd.effect.n)||2;
      const threat = e => (hasKw(e,"flying")?100:0) + (5-rowFromEdge(p.i,e.row))*8 + atkOf(e)*3 + (hpOf(e)<=n?60:0);
      target = pool.slice().sort((a,b)=>threat(b)-threat(a))[0];
    }
    if (target) castSpell(p, idx, target);
  }
  else if (cd.type==="artifact"){
    const t = allUnits().filter(u=>u.owner===p.i && !u.isArch).sort((a,b)=>atkOf(b)-atkOf(a))[0];
    if (t) equipArtifact(p, idx, t);
  }
  else if (cd.type==="glyph"){
    const tiles = glyphTiles(p);
    if (tiles.length){
      let best=null, bs=-1;
      for (const [c,r] of tiles){
        const fwd = rowFromEdge(p.i, r);
        const threat = allUnits().filter(u=>u.owner!==p.i && !u.isArch && u.col===c).length;
        const sc = fwd*4 + threat*10 + (2-Math.abs(2-c));
        if (sc>bs){ bs=sc; best=[c,r]; }
      }
      placeGlyph(p, idx, best[0], best[1]);
    }
  }
}
function colBlockedForP(pi, c){
  // any enemy arch or unit in this column on the way to enemy edge
  for (let r=0;r<ROWS;r++){ const u = unitAt(c,r); if (u && u.owner!==pi) return true; }
  return false;
}
function botBestStrike(p){
  let best=null, bs=-1;
  for (const u of allUnits()){
    if (u.owner!==p.i || u.bound || u.struck || atkOf(u)<=0) continue;
    const st = legalStrikeTargets(u);
    if (st.god){ const s = 1000 + atkOf(u); if (s>bs){ bs=s; best={u, t:"god"}; } }
    for (const t of st.units){
      let s = 0;
      const kills = hpOf(t) <= atkOf(u) || (t.isArch && u.cardId==="kaedusOmega");
      const retal = !t.isArch && !effPiercing(u) && canStrike(t,u);
      s = (kills? 400+atkOf(t)*10 : atkOf(u)*6 - (retal? atkOf(t)*4:0)) + (t.isArch? -8 : 0) + (hasKw(t,"ascendant")? 25:0) + (hasKw(t,"flying")? 40:0) + (5-rowFromEdge(p.i,t.row))*4;
      if (t.isArch && botWantsLane(p, t.col)) s += 60;
      if (s>bs){ bs=s; best={u, t}; }
    }
  }
  if (best && bs>0){ strike(best.u, best.t); return true; }
  return false;
}
function botWantsLane(p, c){
  return allUnits().some(u=>u.owner===p.i && !u.isArch && u.col===c);
}
function botBestMarch(p){
  let best=null, bs=-1e9;
  for (const u of allUnits()){
    if (u.owner!==p.i || u.isArch || u.bound) continue;
    if (u.marched >= (hasKw(u,"swift")?2:1)) continue;
    const cur = rowFromEdge(1-p.i, u.row); // distance-ish to enemy edge (0 = at their back row)
    for (const [c,r] of reachableTiles(u)){
      const nd = rowFromEdge(1-p.i, r);
      let s = (cur-nd)*20;                       // progress toward enemy
      s -= Math.abs(2-c);                        // slight center bias
      // avoid parking adjacent to enemy Guard walls of muscle
      const adjEnemies = allUnits().filter(t=>t.owner!==p.i && !t.isArch && Math.abs(t.col-c)+Math.abs(t.row-r)===1);
      s -= adjEnemies.reduce((a,t)=>a+atkOf(t)*2,0);
      if (s>bs){ bs=s; best={u,c,r}; }
    }
  }
  if (best && bs>0){ march(best.u, best.c, best.r); return true; }
  return false;
}

function botWantsAwaken(p){
  const id=p.god.id;
  if (id==="godKaerok") return allUnits().some(u=>u.owner===p.i && u.isArch);
  if (id==="godToll") return fallenCreatures(p).length>0;
  if (id==="godBloom"||id==="godRend"||id==="godSurge") return allUnits().some(u=>u.owner===p.i && !u.isArch);
  return allUnits().some(u=>u.owner!==p.i && !u.isArch);
}
function botTryAct(p){
  const act=p.god.act, m=act.mode;
  if (p.actUsed || p.essence<act.cost) return false;
  if (act.soulCost && p.souls<act.soulCost) return false;
  const enemies=allUnits().filter(u=>u.owner!==p.i && !u.isArch);
  const friends=allUnits().filter(u=>u.owner===p.i && !u.isArch);
  if (m==="healArch"){ const t=allUnits().filter(u=>u.owner===p.i&&u.isArch&&u.dmg>0).sort((a,b)=>b.dmg-a.dmg)[0]; if(t){payAct(p);t.dmg=Math.max(0,t.dmg-2);log(`${p.god.name} reforges <b>${CARDS[t.cardId].name}</b>.`,"hl");return true;} return false; }
  if (m==="gust"){ let best=null,bs=0; for (const f of friends){ if(!hasKw(f,"flying")||f.bound) continue; const cur=rowFromEdge(1-p.i,f.row); for (const [c,r] of reachableFly(f,2)){ const g=cur-rowFromEdge(1-p.i,r); if(g>bs){bs=g;best={f,c,r};}}} if(best&&bs>=2){payAct(p);moveUnit(best.f,best.c,best.r);log(`${p.god.name}'s Gust carries <b>${CARDS[best.f.cardId].name}</b>.`,"hl");return true;} return false; }
  if (m==="damageAny"){ const n=act.n||1; const t=enemies.find(e=>hpOf(e)<=n)||enemies.sort((a,b)=>hpOf(a)-hpOf(b))[0]; if(t){payAct(p);log(`${p.god.name} Reaps <b>${CARDS[t.cardId].name}</b> for ${n}.`,"hl");dealDamage(t,n,null);return true;} return false; }
  if (m==="damageFriendDraw"){ const t=friends.filter(f=>hpOf(f)>1&&!f.token).sort((a,b)=>hpOf(b)-hpOf(a))[0]; if(t){payAct(p);log(`${p.god.name} exacts the Blood Price.`,"hl");dealDamage(t,1,null,"#e5543a");drawCard(p);return true;} return false; }
  if (m==="displace"){ const t=enemies.filter(e=>canBeForced(e)).sort((a,b)=>rowFromEdge(p.i,a.row)-rowFromEdge(p.i,b.row))[0]; if(t){ const dr=t.owner===0?-1:1,nr=t.row+dr; if(canStand(t,t.col,nr)){payAct(p);moveUnit(t,t.col,nr);log(`${p.god.name} Displaces <b>${CARDS[t.cardId].name}</b>.`,"hl");return true;} } return false; }
  if (m==="sprout"){ const t=emptyDeployTile(p,CARDS["sapling"]); if(t){payAct(p);summonToken(p,"sapling",t[0],t[1]);log(`${p.god.name} Sprouts a Sapling.`,"hl");return true;} return false; }
  if (m==="refreshFriend"){ const t=friends.filter(f=>!f.bound&&f.marched>0).sort((a,b)=>rowFromEdge(1-p.i,a.row)-rowFromEdge(1-p.i,b.row))[0]; if(t){payAct(p);t.marched=0;log(`${p.god.name}'s War Cry rallies <b>${CARDS[t.cardId].name}</b>.`,"hl");return true;} return false; }
  if (m==="exileWeak"){ const t=enemies.filter(e=>hpOf(e)<=2).sort((a,b)=>atkOf(b)-atkOf(a))[0]; if(t){payAct(p);log(`${p.god.name} Absolves <b>${CARDS[t.cardId].name}</b>.`,"hl");exileUnit(t);return true;} return false; }
  if (m==="venomAny"){ const t=enemies.filter(e=>(e.venom||0)<3).sort((a,b)=>maxHpOf(b)-maxHpOf(a))[0]; if(t){payAct(p);t.venom=Math.min(3,(t.venom||0)+1);log(`${p.god.name} Infests <b>${CARDS[t.cardId].name}</b>.`,"hl");return true;} return false; }
  if (m==="markEnemy"){ const t=enemies.sort((a,b)=>hpOf(a)-hpOf(b))[0]; if(t){payAct(p);p.markedUid=t.uid;log(`${p.god.name} Marks <b>${CARDS[t.cardId].name}</b>.`,"hl");return true;} return false; }
  return false;
}

/* ---------- bot-vs-bot smoke test hook ---------- */
window.__realmBotDuel = async function(turns, dkA, dkB){
  INSTANT = true;
  ARENA_CHOICE = ARENAS[0];
  newGame("bot", DECKS[dkA]||DECKS.crucible, DECKS[dkB]||DECKS.gale, ["BotA","BotB"]);
  G.hideHands = false;
  let t = 0;
  while (!G.over && t<turns){
    const pi = G.turn;
    const p = G.players[pi];
    for (const u of [...G.pendingAscends]) if (allUnits().includes(u)) ascend(u);
    if (p.awakenReady && !p.awakened && botWantsAwaken(p)) performAwaken(p);
    let g=0; while (g++<20 && !G.over){ const i = botPickCard(p); if (i===-1) break; botPlayCard(p,i); }
    botTryAct(p);
    g=0; while (p.cmds>0 && g++<12 && !G.over){
      if (botBestStrike(p)) continue;
      if (botBestMarch(p)) continue;
      if (!p.channeled){ onBotChannel(p); continue; }
      const owr = allUnits().find(u=>u.owner===p.i && !u.isArch && atkType(u)==="ranged" && !u.bound && !u.struck && !u.overwatch
        && allUnits().some(e=>e.owner!==p.i && !e.isArch && dist(u.col,u.row,e.col,e.row)<=rangeOf(u)+2));
      if (owr && p.cmds>0){ p.cmds--; owr.struck=true; owr.overwatch=true; continue; }
      break;
    }
    if (!G.over) endTurn();
    t++;
  }
  INSTANT = false;
  const res = { over:G.over, winner:G.winner===null?null:G.players[G.winner].name, rounds:G.round,
    hp:[G.players[0].hp, G.players[1].hp], units:allUnits().length, logTail:G.log.slice(-6).map(l=>l.msg) };
  renderAll();
  return res;
};
window.__realmState = ()=>G;

/* ============================ AUDIO — procedural cinematic score ============================ */
/* Two-Steps-From-Hell-flavoured: dark taiko + low-brass engine with a heroic choir/strings lift.
   Fully synthesised via Web Audio (no files), adaptive intensity that scales to the battle. */
const _mtof = m => 440 * Math.pow(2, (m-69)/12);
const AUDIO = {
  ctx:null, master:null, mbus:null, sbus:null, reverb:null, revGain:null, noiseBuf:null,
  muted:false, musicVol:0.6, sfxVol:0.9, stream:null, _streamTried:false, _lastLead:null,
  intensity:0.16, targetBase:0.16, bumpAmt:0,
  step:0, nextStepTime:0, stepDur:0.385, timer:null,
  // i–VI–III–VII in D minor: Dm — Bb — F — C  (bass MIDI + mid-register triad)
  PROG:[ {bass:38, pad:[50,53,57]}, {bass:34, pad:[46,50,53]}, {bass:41, pad:[45,48,53]}, {bass:36, pad:[48,52,55]} ],
  // a big, singable, triumphant melody arcing across the 4-bar phrase and cresting on a high A
  MEL:[ {s:0,m:69,d:6},{s:6,m:72,d:2},          // A4 -> C5
        {s:8,m:74,d:8},                          // D5, the lift
        {s:16,m:70,d:6},{s:22,m:74,d:2},         // Bb4 -> D5
        {s:24,m:77,d:8},                          // F5, soaring
        {s:32,m:72,d:8},                          // C5
        {s:40,m:81,d:8},                          // A5, triumphant peak
        {s:48,m:76,d:6},{s:54,m:79,d:2},         // E5 -> G5
        {s:56,m:74,d:8} ],                        // D5, resolves home and loops

  ensure(){
    if (this.ctx){ if (this.ctx.state==="suspended") this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    let C; try { C = new AC(); } catch(e){ return; }
    this.ctx = C;
    const nb = C.createBuffer(2, Math.floor(C.sampleRate*2), C.sampleRate);
    for (let ch=0; ch<2; ch++){ const d = nb.getChannelData(ch); for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
    this.noiseBuf = nb;
    this.master = C.createGain(); this.master.gain.value = 0.82;
    this.comp = C.createDynamicsCompressor();
    this.comp.threshold.value=-11; this.comp.knee.value=26; this.comp.ratio.value=6; this.comp.attack.value=0.005; this.comp.release.value=0.28;
    this.master.connect(this.comp); this.comp.connect(C.destination);
    this.reverb = C.createConvolver(); this.reverb.buffer = this._impulse(3.4, 2.4);   // bigger cinematic hall
    this.revGain = C.createGain(); this.revGain.gain.value = 0.62; this.reverb.connect(this.revGain); this.revGain.connect(this.master);
    // music bus -> gentle high-shelf cut (tames digital fizz) -> master; hall via 23ms predelay (real-room cue)
    this.mtone = C.createBiquadFilter(); this.mtone.type="highshelf"; this.mtone.frequency.value=6200; this.mtone.gain.value=-5;
    this.mbus = C.createGain(); this.mbus.gain.value = this.muted?0.0001:this.musicVol*0.5;
    this.mbus.connect(this.mtone); this.mtone.connect(this.master);
    this.predel = C.createDelay(0.1); this.predel.delayTime.value = 0.023; this.mbus.connect(this.predel); this.predel.connect(this.reverb);
    this._tryStream();
    this.sbus = C.createGain(); this.sbus.gain.value = this.sfxVol; this.sbus.connect(this.master); this.sbus.connect(this.reverb);
    const bpm = 72; this.stepDur = (60/bpm)/4;   // sixteenth grid at a stately, majestic tempo
    this.nextStepTime = C.currentTime + 0.15; this.step = 0;
    this.updateIntensity();

  },
  _impulse(sec, decay){

  /* --- humanization: real players are never perfect --- */

  _sub(t, midi, dur, vel){

  _strings(t, midi, dur, vel, lead){

      const bg2=C.createGain(); bg2.gain.setValueAtTime(0.0001,dt); bg2.gain.linearRampToValueAtTime(v*0.05,dt+0.6); bg2.gain.linearRampToValueAtTime(0.0001,dt+dur);

    const fb=71+Math.random()*4;                                   // ~D2, retuned slightly every hit
    for (const [r,dec,mv] of [[1,0.9,0.5],[1.5,0.62,0.24],[1.98,0.45,0.14],[2.44,0.3,0.08]]){
      const o=C.createOscillator(), g=C.createGain();
      o.type="sine"; o.frequency.setValueAtTime(fb*r*1.02,dt); o.frequency.exponentialRampToValueAtTime(fb*r,dt+0.06);
      g.gain.setValueAtTime(v*mv,dt); g.gain.exponentialRampToValueAtTime(0.001,dt+dec);
      o.connect(g); g.connect(this.mbus); o.start(dt); o.stop(dt+dec+0.05);
    }
    this._noiseHit(dt, 0.05, "lowpass", 900, v*0.5, this.mbus);    // mallet thump
    this._noiseHit(dt, 0.16, "bandpass", 150, v*0.55, this.mbus);  // skin rumble
  },
  _cymbal(t, vel, dest){
    // layered crash: bright partials with staggered decays instead of one flat noise burst
    const d = dest||this.mbus;
    for (const [fc,q,dur,g] of [[3100,1.0,1.5,0.7],[5300,1.4,1.0,0.55],[7900,1.2,0.6,0.4]])
      this._noiseHit(t+Math.random()*0.008, dur, "bandpass", fc, vel*g, d);
    this._noiseHit(t, 1.8, "highpass", 6800, vel*0.28, d);         // long shimmer tail
  },
  _spicc(t, midi, vel){        // short staccato string stab (sixteenth ostinato)
    const C=this.ctx, f=_mtof(midi), o=C.createOscillator(), o2=C.createOscillator(), lp=C.createBiquadFilter(), g=C.createGain();
    o.type="sawtooth"; o2.type="sawtooth"; o.frequency.value=f; o2.frequency.value=f; o2.detune.value=7;
    lp.type="lowpass"; lp.frequency.value=3200; lp.Q.value=0.8;
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vel,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+0.11);
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(this.mbus); o.start(t); o2.start(t); o.stop(t+0.14); o2.stop(t+0.14);
  },
  _snare(t, vel){              // noise crack + tonal body
    this._noiseHit(t, 0.13, "highpass", 1900, vel, this.mbus);
    const C=this.ctx, o=C.createOscillator(), g=C.createGain();
    o.type="triangle"; o.frequency.setValueAtTime(330,t); o.frequency.exponentialRampToValueAtTime(180,t+0.08);
    g.gain.setValueAtTime(vel*0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.connect(g); g.connect(this.mbus); o.start(t); o.stop(t+0.14);
  },
  _riser(t, dur){
    const C=this.ctx, s=C.createBufferSource(), bp=C.createBiquadFilter(), g=C.createGain();
    s.buffer=this.noiseBuf; s.loop=true; bp.type="bandpass"; bp.Q.value=2;
    bp.frequency.setValueAtTime(400,t); bp.frequency.exponentialRampToValueAtTime(4200,t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+dur); g.gain.linearRampToValueAtTime(0.0001,t+dur+0.08);
    s.connect(bp); bp.connect(g); g.connect(this.mbus); s.start(t); s.stop(t+dur+0.12);
  },
  _noiseHit(t, dur, ft, fr, vel, dest){
    const C=this.ctx, s=C.createBufferSource(), f=C.createBiquadFilter(), g=C.createGain();
    s.buffer=this.noiseBuf; f.type=ft; f.frequency.value=fr;
    g.gain.setValueAtTime(vel,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    s.connect(f); f.connect(g); g.connect(dest||this.mbus); s.start(t); s.stop(t+dur+0.05);
  },

  updateIntensity(){
    if (!this.ctx || INSTANT) return;
    let t;
    if (!G || G.menu){ t = 0.22; }
    else if (G.over){ t = 0.0; }
    else {
      // triumphant from the first turn: strings, choir, brass and the soaring melody are all in at the floor
      const a=G.players[0].hp, b=G.players[1].hp, minHp=Math.min(a,b);
      let x = 0.5 + (30-minHp)/30 * 0.45;
      if (G.players.some(p=>p.awakened)) x += 0.1;
      if (allUnits().some(u=>CARDS[u.cardId].type==="omega")) x += 0.12;
      if (G.pendingAscends && G.pendingAscends.length) x += 0.1;
      t = Math.min(1, x);
    }
    this.targetBase = t;
  },
  bump(a){ if (!this.ctx) return; this.bumpAmt = Math.min(0.6, this.bumpAmt + a); },
  victory(won){
    if (!this.ctx || INSTANT) return;
    this.targetBase = 0; this.intensity = 0;
    if (this.muted) return;
    const t = this.ctx.currentTime + 0.06;
    if (won!==false) this._fanfare(t);
    else { this._swell(t, [38,41,44], 1.6); this._noiseHit(t, 0.8, "lowpass", 600, 0.28, this.sbus); }
  },
  _swell(t, ms, dur){
    const C=this.ctx;
    ms.forEach(m=>{ const o=C.createOscillator(), lp=C.createBiquadFilter(), g=C.createGain();
      o.type="sawtooth"; o.frequency.value=_mtof(m);
      lp.type="lowpass"; lp.frequency.setValueAtTime(300,t); lp.frequency.exponentialRampToValueAtTime(2600,t+dur);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12,t+dur*0.8); g.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.2);
      o.connect(lp); lp.connect(g); g.connect(this.sbus); g.connect(this.reverb); o.start(t); o.stop(t+dur+0.25); });
  },
  _stinger(t){
    const C=this.ctx, bus=this.sbus;
    this._cymbal(t, 0.5, bus);
    { const o=C.createOscillator(), g=C.createGain(); o.type="sine"; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(40,t+0.5);
      g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.7); o.connect(g); g.connect(bus); o.start(t); o.stop(t+0.75); }
    [50,54,57,62,66].forEach((m,k)=>{                       // rising D-major triad = triumphant lift
      const o=C.createOscillator(), lp=C.createBiquadFilter(), g=C.createGain(), f=_mtof(m);
      o.type = k<3?"sawtooth":"triangle"; o.frequency.setValueAtTime(f*0.99,t); o.frequency.exponentialRampToValueAtTime(f,t+0.25);
      lp.type="lowpass"; lp.frequency.setValueAtTime(500,t); lp.frequency.exponentialRampToValueAtTime(3600,t+0.5);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.14,t+0.12); g.gain.setValueAtTime(0.14,t+0.9); g.gain.exponentialRampToValueAtTime(0.0001,t+1.6);
      o.connect(lp); lp.connect(g); g.connect(bus); g.connect(this.reverb); o.start(t); o.stop(t+1.7);
    });
  },
  _fanfare(t){
    const C=this.ctx, bus=this.sbus;
    [[0,62],[0.18,66],[0.36,69],[0.54,74]].forEach(([dt,m])=>{     // D F# A D — heroic ascent
      const tt=t+dt, o=C.createOscillator(), o2=C.createOscillator(), lp=C.createBiquadFilter(), g=C.createGain();
      o.type="sawtooth"; o2.type="sawtooth"; o.frequency.value=_mtof(m); o2.frequency.value=_mtof(m); o2.detune.value=8;
      lp.type="lowpass"; lp.frequency.setValueAtTime(500,tt); lp.frequency.linearRampToValueAtTime(2600,tt+0.04);
      g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.18,tt+0.02); g.gain.setTargetAtTime(0.0001,tt+0.2,0.14);
      o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(bus); g.connect(this.reverb); o.start(tt); o2.start(tt); o.stop(tt+0.6); o2.stop(tt+0.6);
    });
    const tc=t+0.72;
    [50,54,57,62].forEach(m=>{                                    // held D-major chord
      const o=C.createOscillator(), o2=C.createOscillator(), lp=C.createBiquadFilter(), g=C.createGain();
      o.type="sawtooth"; o2.type="triangle"; o.frequency.value=_mtof(m); o2.frequency.value=_mtof(m+12);
      lp.type="lowpass"; lp.frequency.value=3000;
      g.gain.setValueAtTime(0.0001,tc); g.gain.exponentialRampToValueAtTime(0.13,tc+0.05); g.gain.setValueAtTime(0.13,tc+1.1); g.gain.exponentialRampToValueAtTime(0.0001,tc+2.0);
      o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(bus); g.connect(this.reverb); o.start(tc); o2.start(tc); o.stop(tc+2.1); o2.stop(tc+2.1);
    });
    this._cymbal(tc, 0.55, bus);
    [0,0.72,1.1].forEach(dt=>{ const tt=t+dt, o=C.createOscillator(), g=C.createGain();
      o.type="sine"; o.frequency.setValueAtTime(95,tt); o.frequency.exponentialRampToValueAtTime(48,tt+0.16);
      g.gain.setValueAtTime(0.5,tt); g.gain.exponentialRampToValueAtTime(0.001,tt+0.3); o.connect(g); g.connect(bus); o.start(tt); o.stop(tt+0.32); });
  },

  toggleMute(){
    this.ensure();
    this.muted = !this.muted;
    const el=document.getElementById("audioCtl"), b=document.getElementById("audioMute");
    if (this.ctx && this.mbus) this.mbus.gain.setTargetAtTime(this.muted?0.0001:this.musicVol*0.5, this.ctx.currentTime, 0.1);
    if (this.ctx && this.sbus) this.sbus.gain.setTargetAtTime(this.muted?0.0001:this.sfxVol, this.ctx.currentTime, 0.1);
    if (this.stream){ if (this.muted) this.stream.pause(); else this.stream.play().catch(()=>{}); }
    if (b) b.textContent = this.muted ? "🔇" : "🔊";
    if (el) el.classList.toggle("off", this.muted);
  },
  setVolume(v){
    this.musicVol = v; this.ensure();
    if (this.ctx && this.mbus && !this.muted) this.mbus.gain.setTargetAtTime(v*0.5, this.ctx.currentTime, 0.05);
    if (this.stream) this.stream.volume = this.muted?0:v;
  },
  showControl(v){ const el=document.getElementById("audioCtl"); if (el) el.style.display = v ? "flex" : "none"; },
  sfx(name){
    if (!this.ctx || INSTANT || this.muted) return;
    const C=this.ctx, bus=this.sbus, t=C.currentTime+0.01;
    const beep=(type,f0,f1,dur,vel,slideT)=>{ const o=C.createOscillator(); o.type=type; o.frequency.setValueAtTime(f0,t);
      if (f1) o.frequency.exponentialRampToValueAtTime(f1,t+(slideT||dur));
      const g=C.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vel,t+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.connect(g); g.connect(bus); o.start(t); o.stop(t+dur+0.03); };
    switch(name){
      case "click":  beep("triangle",520,720,0.06,0.10,0.05); break;
      case "deploy": beep("sine",120,60,0.18,0.34); beep("triangle",240,430,0.16,0.13,0.14); this._noiseHit(t,0.09,"lowpass",1400,0.16,bus); break;
      case "strike": beep("square",300,120,0.09,0.15); this._noiseHit(t,0.08,"bandpass",2200,0.26,bus); break;
      case "godHit": beep("sine",150,42,0.4,0.5); beep("sawtooth",180,120,0.22,0.12); this._noiseHit(t,0.18,"lowpass",900,0.36,bus); break;
      case "spell":  [0,4,7,12,16].forEach((iv,k)=>{ const tt=t+k*0.04, o=C.createOscillator(), g=C.createGain(); o.type="sine"; o.frequency.value=_mtof(64+iv);
                       g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.11,tt+0.01); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.5);
                       o.connect(g); g.connect(bus); g.connect(this.reverb); o.start(tt); o.stop(tt+0.55); }); this._noiseHit(t,0.4,"highpass",3000,0.07,bus); break;
      case "channel":[0,7,12].forEach((iv,k)=>{ const tt=t+k*0.05, o=C.createOscillator(), g=C.createGain(); o.type="triangle"; o.frequency.value=_mtof(60+iv);
                       g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.13,tt+0.01); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.4);
                       o.connect(g); g.connect(bus); o.start(tt); o.stop(tt+0.45); }); break;
      case "godact": [0,3,7].forEach(iv=>beep("sine",_mtof(67+iv),_mtof(67+iv),0.4,0.09)); this._noiseHit(t,0.3,"bandpass",1600,0.09,bus); break;
      case "turn":   this._noiseHit(t,0.35,"bandpass",700,0.10,bus); break;
      case "awaken": this._swell(t,[55,62,67],0.9); this._noiseHit(t,0.5,"highpass",5000,0.12,bus); break;
      case "ascend": this._stinger(t); break;
      case "victory":this._fanfare(t); break;
    }
  }
};
function sfx(n){ AUDIO.sfx(n); }

/* ============================ BOOT ============================ */
document.body.insertAdjacentHTML("beforeend", sharedDefsSVG());
document.body.insertAdjacentHTML("beforeend",
  `<div id="audioCtl" title="Music &amp; sound effects">
     <button id="audioMute" aria-label="Toggle sound">🔊</button>
     <span class="albl">Vol</span>
     <input id="audioVol" type="range" min="0" max="100" value="60">
   </div>`);
$("#audioMute").onclick = ()=> AUDIO.toggleMute();
$("#audioVol").oninput = e => AUDIO.setVolume(+e.target.value/100);
function _armAudio(){ AUDIO.ensure(); window.removeEventListener("pointerdown", _armAudio); window.removeEventListener("keydown", _armAudio); }
window.addEventListener("pointerdown", _armAudio); window.addEventListener("keydown", _armAudio);

/* ---------- leave-match guard (browser Back / touch swipe-back) ---------- */
let MATCH_GUARD = false;
function armMatchGuard(){
  if (MATCH_GUARD) return;
  MATCH_GUARD = true;
  try{ history.pushState({realm:"match"}, ""); }catch(e){}
}
function disarmMatchGuard(){ MATCH_GUARD = false; const o=document.getElementById("leaveOv"); if (o) o.remove(); }
function showLeaveConfirm(){
  if (document.getElementById("leaveOv")) return;
  const ov=document.createElement("div");
  ov.id="leaveOv"; ov.className="overlay on"; ov.style.zIndex=1200;
  ov.innerHTML=`<div style="text-align:center; max-width:460px;">
    <h2>Leave the Arena?</h2>
    <div class="sub2">Going back now returns you to the main menu and <b>ends this match</b>${MODE==="online"?" \u2014 your opponent will be dropped":""}. There is no resuming.</div>
    <div class="btnrow" style="justify-content:center; margin-top:18px;">
      <button class="btn" id="leaveStay" style="border-color:var(--gold-bright);">Keep Playing</button>
      <button class="btn danger" id="leaveGo">Leave to Menu</button>
    </div></div>`;
  document.body.appendChild(ov);
  document.getElementById("leaveStay").onclick=()=>{ ov.remove(); };
  document.getElementById("leaveGo").onclick=()=>{ ov.remove(); disarmMatchGuard(); try{ NET.leave(); }catch(e){} G=null; renderMenu(); };
}
window.addEventListener("popstate", ()=>{
  if (MATCH_GUARD && G && !G.over){
    try{ history.pushState({realm:"match"}, ""); }catch(e){}   // re-trap so we stay put
    showLeaveConfirm();
  }
});
window.addEventListener("beforeunload", (e)=>{
  if (MATCH_GUARD && G && !G.over){ e.preventDefault(); e.returnValue=""; return ""; }
});
document.addEventListener("click", e => {
  if (AUDIO.stream && AUDIO.stream.paused && !AUDIO.muted) AUDIO.stream.play().catch(()=>{});   // keep the soundtrack alive
  if (e.target.closest(".btn, .deckcard")) sfx("click");
}, true);
renderMenu();

/* marker: engine end */
</script>
<audio id="bgm" loop preload="auto" src="soundtrack.mp3"></audio>
