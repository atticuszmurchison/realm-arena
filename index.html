<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REALM — Arena of Gods · Digital Prototype</title>
<style>
  /* ============ REALM: Obsidian & Gold ============ */
  :root{
    --obsidian:#0b0b10; --obsidian2:#131319; --obsidian3:#1b1b24;
    --gold:#d4af5a; --gold-bright:#f2d288; --gold-dim:#8a7340;
    --bone:#e8e2d2; --ash:#9a94a6;
    --war:#e5543a; --light:#f0c22e; --storm:#35c3e8; --wild:#5abf5f;
    --death:#a05bd8; --void:#98a2b3; --neutral:#b08d57;
    --hp:#e0574f; --atk:#f2d288; --spd:#7fd1e8;
    --tile:#15151d; --tile-edge:#26263a; --verge:#1a1626;
  }
  *{box-sizing:border-box; margin:0; padding:0; user-select:none;}
  html{height:100%;}
  body{
    min-height:100%;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1c1830 0%, transparent 60%),
      radial-gradient(900px 500px at 50% 110%, #241a10 0%, transparent 60%) fixed,
      var(--obsidian);
    color:var(--bone);
    font-family:'Palatino Linotype','Book Antiqua',Georgia,'Times New Roman',serif;
    overflow-x:hidden;
    overflow-y:auto;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}

  /* ---------- Menu ---------- */
  .menu{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    text-align:center; padding:40px 20px;
  }
  .logo{ line-height:1; }
  .logo .realm{
    font-size:clamp(64px,10vw,120px); letter-spacing:.28em; font-weight:bold; color:var(--gold-bright);
    text-shadow:0 0 30px rgba(212,175,90,.35), 0 2px 0 #6b5626;
  }
  .logo .sub{
    font-size:clamp(15px,2vw,22px); letter-spacing:.62em; color:var(--ash); margin-top:10px; text-transform:uppercase;
  }
  .menu .tag{ color:var(--gold-dim); font-style:italic; max-width:560px; font-size:15px; line-height:1.55;}
  .btnrow{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center;}
  .btn{
    background:linear-gradient(180deg,#23232e,#15151c);
    border:1px solid var(--gold-dim); color:var(--gold-bright);
    padding:14px 30px; font-family:inherit; font-size:17px; letter-spacing:.14em; text-transform:uppercase;
    cursor:pointer; border-radius:4px; transition:all .15s;
  }
  .btn:hover{ border-color:var(--gold-bright); box-shadow:0 0 18px rgba(212,175,90,.25); transform:translateY(-1px);}
  .btn.small{ padding:8px 16px; font-size:12px;}
  .btn.danger{ color:#e88; border-color:#844;}
  .deckpick{ display:flex; gap:22px; justify-content:center; flex-wrap:wrap;}
  .deckcard{
    width:250px; border:1px solid var(--gold-dim); border-radius:8px; padding:16px; cursor:pointer;
    background:linear-gradient(180deg,#17171f,#0e0e13); transition:all .15s; text-align:left;
  }
  .deckcard:hover{ box-shadow:0 0 24px rgba(212,175,90,.2); transform:translateY(-2px);}
  .deckcard.sel{ border-color:var(--gold-bright); box-shadow:0 0 24px rgba(212,175,90,.35);}
  .deckcard h3{ color:var(--gold-bright); font-size:17px; letter-spacing:.05em; margin-bottom:4px;}
  .deckcard .doms{ font-size:12px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:8px;}
  .deckcard p{ font-size:12.5px; color:var(--ash); line-height:1.5; font-style:italic;}
  .menuNote{ font-size:12px; color:#665; letter-spacing:.05em;}

  /* ---------- Game layout ---------- */
  .game{ height:100vh; display:none; grid-template-columns:minmax(0,1fr) 340px; grid-template-rows:auto 1fr auto; }
  .game.on{ display:grid; overflow:hidden; }
  .topbar,.botbar{ grid-column:1; display:flex; align-items:center; gap:14px; padding:6px 14px; min-width:0; }
  .midzone{ min-width:0; }
  .hand{ min-width:0; }
  .midzone{ grid-column:1; grid-row:2; display:flex; align-items:center; justify-content:center; gap:18px; min-height:0; padding:2px 8px;}
  .side{ grid-column:2; grid-row:1 / span 3; border-left:1px solid #23232f; display:flex; flex-direction:column; min-height:0; background:rgba(10,10,14,.6);}

  /* god plates */
  .godplate{ display:flex; align-items:center; gap:12px; padding:4px 10px; border:1px solid #2a2a38; border-radius:8px;
    background:linear-gradient(180deg,#15151d,#0d0d12); position:relative; }
  .godplate.targetable{ border-color:var(--war); box-shadow:0 0 18px rgba(229,84,58,.5); cursor:pointer; animation:pulse 1s infinite;}
  @keyframes pulse{ 0%,100%{box-shadow:0 0 10px rgba(229,84,58,.35);} 50%{box-shadow:0 0 26px rgba(229,84,58,.7);} }
  .godmed{ position:relative; width:52px; height:52px; border-radius:50%; border:2px solid var(--gold-dim); overflow:hidden; flex:none; background:#000;
    box-shadow:0 0 0 1px #06060a, 0 0 12px rgba(212,175,90,.3);}
  .godmed .artwrap{ position:absolute; inset:0;}
  .godmed .artimg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2;}
  .godmed svg{ position:absolute; inset:0; width:100%; height:100%; display:block;}
  .godname{ font-size:15px; color:var(--gold-bright); letter-spacing:.05em; white-space:nowrap;}
  .godpass{ font-size:10.5px; color:var(--ash); font-style:italic; max-width:210px; line-height:1.3;}
  .gstats{ display:flex; gap:10px; align-items:center; margin-left:6px;}
  .orb{ display:flex; flex-direction:column; align-items:center; justify-content:center; width:52px; height:52px; border-radius:50%;
    font-weight:bold; flex:none; }
  .orb .v{ font-size:19px; line-height:1;}
  .orb .l{ font-size:8px; letter-spacing:.12em; text-transform:uppercase; opacity:.8;}
  .orb.hp{ background:radial-gradient(circle at 35% 30%, #7a2a24, #3a120e); border:2px solid #a2453a; color:#ffd9d2;}
  .orb.es{ background:radial-gradient(circle at 35% 30%, #2a5a7a, #10222e); border:2px solid #3a7fa2; color:#d2f0ff;}
  .handcount{ font-size:12px; color:var(--ash);}
  .cmdpips{ display:flex; gap:5px; align-items:center;}
  .pip{ width:16px; height:16px; transform:rotate(45deg); background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim));
    border:1px solid #6b5626; box-shadow:0 0 8px rgba(212,175,90,.4);}
  .pip.spent{ background:#22222c; box-shadow:none; border-color:#333;}
  .roundlab{ margin-left:auto; text-align:right; font-size:12px; color:var(--ash); letter-spacing:.15em; text-transform:uppercase;}
  .roundlab b{ color:var(--gold-bright); font-size:15px; display:block; letter-spacing:.2em;}

  /* ---------- Board · Grand Arena ---------- */
  .boardwrap{ position:relative; height:100%; display:flex; align-items:center; justify-content:center; }
  .boardwrap::before{ content:""; position:absolute; inset:-60px; border-radius:50%; pointer-events:none;
    background:radial-gradient(closest-side, rgba(120,95,185,.16), transparent 72%);}
  /* ornate gold frame presiding over the arena */
  .arena-frame{ position:relative; padding:14px; border-radius:14px;
    background:
      linear-gradient(180deg, rgba(70,22,24,.42), transparent 22%),
      linear-gradient(0deg, rgba(64,50,22,.42), transparent 22%),
      linear-gradient(135deg,#241d10 0%,#141220 45%,#100e18 55%,#1f180c 100%);
    border:2px solid #6e5a2e;
    box-shadow:0 0 0 1px #08080c, 0 0 0 3px rgba(212,175,90,.07), 0 0 46px rgba(212,175,90,.16),
      0 26px 70px rgba(0,0,0,.72), inset 0 0 22px rgba(0,0,0,.6);
  }
  .arena-frame::before{ content:""; position:absolute; inset:5px; border:1px solid rgba(212,175,90,.3); border-radius:9px; pointer-events:none; z-index:6;}
  .corner{ position:absolute; width:36px; height:36px; z-index:7; pointer-events:none;
    background:
      linear-gradient(90deg, var(--gold-bright), transparent 62%) top left/100% 2px no-repeat,
      linear-gradient(180deg, var(--gold-bright), transparent 62%) top left/2px 100% no-repeat,
      radial-gradient(11px 11px at 17px 17px, transparent 6.5px, rgba(242,210,136,.85) 7px 9px, transparent 9.5px);
    filter:drop-shadow(0 0 6px rgba(242,210,136,.6));}
  .corner.tl{ top:4px; left:4px;}
  .corner.tr{ top:4px; right:4px; transform:scaleX(-1);}
  .corner.bl{ bottom:4px; left:4px; transform:scaleY(-1);}
  .corner.br{ bottom:4px; right:4px; transform:scale(-1,-1);}
  .crest{ position:absolute; left:50%; transform:translateX(-50%) rotate(45deg); width:15px; height:15px; z-index:8; pointer-events:none;
    background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim)); border:1px solid #6b5626;
    box-shadow:0 0 11px rgba(242,210,136,.6);}
  .crest.top{ top:-8px;} .crest.bottom{ bottom:-8px;}
  .crest::before{ content:""; position:absolute; inset:3px; background:#140f0a;}
  .flank{ position:absolute; top:14%; bottom:14%; width:1px; pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(212,175,90,.4) 22% 78%,transparent);
    filter:drop-shadow(0 0 4px rgba(212,175,90,.45));}
  .flank::before{ content:""; position:absolute; top:50%; left:50%; width:9px; height:9px; transform:translate(-50%,-50%) rotate(45deg);
    background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim)); box-shadow:0 0 10px rgba(242,210,136,.55);}
  .flank.l{ left:-44px;} .flank.r{ right:-44px;}
  .board{
    display:grid; grid-template-columns:repeat(5, var(--ts)); grid-template-rows:repeat(7, calc(var(--ts) * .82));
    gap:4px; padding:11px 12px 11px 22px; border-radius:9px; position:relative;
    background:
      radial-gradient(135% 52% at 50% 112%, rgba(212,175,90,.17), transparent 58%),
      radial-gradient(135% 52% at 50% -12%, rgba(214,74,60,.16), transparent 58%),
      radial-gradient(72% 26% at 50% 50%, rgba(150,110,222,.22), transparent 72%),
      radial-gradient(closest-side at 50% 50%, transparent 52%, rgba(0,0,0,.5)),
      linear-gradient(180deg,#0e0e16,#0a0a10);
    box-shadow:inset 0 0 100px rgba(0,0,0,.72);
  }
  /* the Verge seam — two luminous rails bracketing the contested row */
  .board::before, .board::after{ content:""; position:absolute; left:20px; right:10px; height:2px; z-index:2; pointer-events:none;
    background:linear-gradient(90deg, transparent, rgba(200,160,255,.8) 14%, rgba(175,135,245,1) 50%, rgba(200,160,255,.8) 86%, transparent);
    box-shadow:0 0 18px rgba(160,120,240,.85), 0 0 5px rgba(200,165,255,.9); animation:seampulse 3.6s ease-in-out infinite;}
  .board::before{ top:calc(20px + 3 * (var(--ts) * .82));}
  .board::after{ top:calc(24px + 4 * (var(--ts) * .82));}
  @keyframes seampulse{ 0%,100%{opacity:.55;} 50%{opacity:1;} }
  .tile{
    background:linear-gradient(160deg,#181820 0%, #12121a 45%, #0e0e15 100%);
    border:1px solid var(--tile-edge); border-radius:5px; position:relative; cursor:default;
    transition:box-shadow .12s, border-color .12s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.045), inset 0 -4px 10px rgba(0,0,0,.5);
  }
  .tile::before{ content:""; position:absolute; top:2px; left:2px; width:5px; height:5px; border-left:1px solid rgba(212,175,90,.16); border-top:1px solid rgba(212,175,90,.16); pointer-events:none;}
  /* territory — warm gold is your realm, cold crimson is the foe's */
  .tile.mine-zone{ background:linear-gradient(160deg,#1d1a12 0%, #16130c 48%, #100d08 100%); border-color:#3c3420;}
  .tile.foe-zone{ background:linear-gradient(160deg,#1f1416 0%, #180f11 48%, #100a0b 100%); border-color:#3d2328;}
  .tile.dz-creature{ border-color:rgba(212,175,90,.34); box-shadow: inset 0 1px 0 rgba(255,255,255,.05), inset 0 -4px 10px rgba(0,0,0,.5), inset 0 0 12px rgba(212,175,90,.09);}
  .tile.dz-arch{ border-color:rgba(212,175,90,.2);}
  .ranklab{ position:absolute; left:-17px; top:50%; transform:translateY(-50%); font-size:11px; color:rgba(212,175,90,.42);
    letter-spacing:.05em; pointer-events:none; z-index:2;}
  .tile.verge{ background:linear-gradient(180deg,#241a3c,#160f28); border-color:#5a4a88;
    box-shadow: inset 0 0 0 1px rgba(150,110,222,.35), inset 0 0 18px rgba(120,82,205,.4);}
  .tile.verge::after{ content:""; position:absolute; inset:0; background:
      repeating-linear-gradient(45deg, transparent 0 9px, rgba(150,110,222,.12) 9px 18px); border-radius:5px; pointer-events:none;
      animation:vergeShimmer 5s ease-in-out infinite;}
  @keyframes vergeShimmer{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .tile.water{ background:linear-gradient(180deg,#0a2c48,#05182b); border-color:#1d5476;
    box-shadow: inset 0 0 0 1px rgba(90,180,240,.3), inset 0 0 16px rgba(30,110,170,.5);}
  .tile.water::after{ content:""; position:absolute; inset:0; border-radius:5px; pointer-events:none; opacity:.6;
    background:repeating-linear-gradient(180deg, transparent 0 5px, rgba(120,200,255,.16) 5px 7px);
    animation:waterwave 4s linear infinite;}
  @keyframes waterwave{ 0%{background-position:0 0;} 100%{background-position:0 7px;} }
  .tile.ridge{ background:linear-gradient(180deg,#42381f,#201808); border-color:#7a6236;
    box-shadow: inset 0 0 0 1px rgba(212,175,90,.28), inset 0 2px 12px rgba(0,0,0,.5);}
  .tile.ridge::after{ content:""; position:absolute; inset:0; border-radius:5px; pointer-events:none; opacity:.6;
    background:linear-gradient(135deg, rgba(0,0,0,.25) 20%, transparent 40%, rgba(242,210,136,.22) 52%, transparent 64%);}
  .tile.well{ background:radial-gradient(circle at 50% 45%, #3f2760, #160a24); border-color:#6a3d9c;
    box-shadow: inset 0 0 0 1px rgba(201,140,240,.35), inset 0 0 18px rgba(150,90,210,.5);}
  .tile.well::after{ content:""; position:absolute; inset:0; border-radius:5px; pointer-events:none;
    background:radial-gradient(circle at 50% 45%, rgba(210,150,248,.34), transparent 58%); animation:wellpulse 3s ease-in-out infinite;}
  @keyframes wellpulse{ 0%,100%{opacity:.45;} 50%{opacity:.95;} }
  .glyphmark{ position:absolute; bottom:2px; right:4px; font-size:13px; z-index:3; pointer-events:auto; color:#8a94b8;
    text-shadow:0 0 6px rgba(138,148,184,.8); animation:glyphpulse 2.6s ease-in-out infinite;}
  .glyphmark.mine{ color:#e8c070; text-shadow:0 0 6px rgba(232,192,112,.8);}
  @keyframes glyphpulse{ 0%,100%{opacity:.55;} 50%{opacity:1;} }
  .tile.threat{ box-shadow:inset 0 0 0 2px rgba(229,84,58,.5), inset 0 0 14px rgba(229,84,58,.28);}
  .terr{ position:absolute; top:2px; left:3px; font-size:12px; opacity:.85; z-index:3; pointer-events:none; filter:drop-shadow(0 1px 1px #000);}
  .tile.deployok{ border-color:var(--gold-bright); box-shadow:inset 0 0 14px rgba(212,175,90,.3); cursor:pointer;}
  .tile.moveok{ border-color:var(--storm); box-shadow:inset 0 0 14px rgba(53,195,232,.3); cursor:pointer;}
  .tile.strikeok{ border-color:var(--war); box-shadow:inset 0 0 16px rgba(229,84,58,.42); cursor:pointer; animation:pulse2 1.1s infinite;}
  @keyframes pulse2{ 0%,100%{box-shadow:inset 0 0 10px rgba(229,84,58,.3);} 50%{box-shadow:inset 0 0 20px rgba(229,84,58,.6);} }
  .tile.spellok{ border-color:var(--death); box-shadow:inset 0 0 14px rgba(160,91,216,.38); cursor:pointer;}

  /* units on board */
  .unit{
    position:absolute; inset:3px; border-radius:4px; overflow:hidden; cursor:pointer;
    border:1px solid #4a3d22; background:#0a0a0e; display:flex; flex-direction:column;
    transition:transform .12s; box-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .unit:hover{ transform:scale(1.04); z-index:5;}
  .unit.p0{ border-color:#66562c; box-shadow:0 2px 8px rgba(0,0,0,.6), 0 0 10px rgba(212,175,90,.32);}
  .unit.p1{ border-color:#69332c; box-shadow:0 2px 8px rgba(0,0,0,.6), 0 0 10px rgba(229,84,58,.32);}
  .unit.sel{ border-color:var(--gold-bright); box-shadow:0 0 16px rgba(212,175,90,.6);}
  .unit.enemy-sel{ border-color:var(--war);}
  .unit .uart{ position:absolute; inset:0;}
  .unit .uart svg{ position:absolute; inset:0; width:100%; height:100%;}
  .artwrap{ position:absolute; inset:0;}
  .artwrap img.artimg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 28%; z-index:2;}
  .unit .ubar{ position:absolute; left:0; right:0; bottom:0; z-index:3; display:flex; justify-content:space-between; align-items:center; padding:6px 4px 1px; background:linear-gradient(transparent, rgba(8,8,12,.28) 46%, rgba(8,8,12,.6));
    font-size:11px; font-weight:bold; text-shadow:0 1px 2px #000, 0 0 6px #000; }
  .unit .uatk{ color:var(--atk);} .unit .uhp{ color:#7be07b;} .unit .uhp.hurt{ color:var(--hp);}
  .unit .flags{ position:absolute; top:2px; left:2px; right:2px; display:flex; justify-content:space-between; font-size:10px; pointer-events:none;}
  .unit .owner-strip{ position:absolute; top:0; left:0; right:0; height:3px;}
  .unit.p0 .owner-strip{ background:linear-gradient(90deg,var(--gold-bright),transparent);}
  .unit.p1 .owner-strip{ background:linear-gradient(90deg,var(--war),transparent);}
  .unit.bound::after{ content:"⛓"; position:absolute; bottom:16px; right:3px; font-size:11px; color:#9aa; text-shadow:0 0 4px #000;}
  .glorypips{ position:absolute; bottom:16px; left:3px; display:flex; gap:2px; pointer-events:none;}
  .glorypips i{ width:6px; height:6px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #ffe9a8, #c79a2e); box-shadow:0 0 5px #f2d288;}

  /* floating damage text */
  .floater{ position:absolute; font-weight:bold; font-size:22px; pointer-events:none; z-index:60;
    text-shadow:0 0 8px #000, 0 2px 2px #000; animation:floatup 1s forwards;}
  @keyframes floatup{ 0%{opacity:0; transform:translateY(6px) scale(.8);} 15%{opacity:1; transform:translateY(0) scale(1.15);} 100%{opacity:0; transform:translateY(-34px) scale(1);} }

  /* ---------- Hand ---------- */
  .hand{ display:flex; gap:8px; align-items:flex-end; padding:4px 6px; min-height:126px; flex:1; overflow-x:auto; overflow-y:visible;}
  .mini{
    width:86px; height:118px; border-radius:6px; border:1px solid #574722; background:#0d0d13; flex:none; cursor:pointer;
    position:relative; overflow:hidden; transition:transform .12s, box-shadow .12s, border-color .12s; display:flex; flex-direction:column;
    box-shadow:0 3px 10px rgba(0,0,0,.55), inset 0 0 0 1px rgba(242,210,136,.09);
  }
  .mini:hover{ transform:translateY(-10px) scale(1.05); z-index:10; border-color:#d4af5a; box-shadow:0 8px 22px rgba(0,0,0,.75), 0 0 16px rgba(212,175,90,.25);}
  .mini.sel{ border-color:var(--gold-bright); box-shadow:0 0 16px rgba(212,175,90,.5); transform:translateY(-8px);}
  .mini.cant{ filter:grayscale(.7) brightness(.55);}
  .mini .mart{ position:absolute; inset:0;}
  .mini .mart svg{ position:absolute; inset:0; width:100%; height:100%;}
  .mini .mname{ position:absolute; left:0; right:0; bottom:14px; z-index:3; font-size:9px; text-align:center; padding:12px 3px 1px; color:var(--bone); letter-spacing:.02em; line-height:1.1;
    background:linear-gradient(transparent, rgba(8,8,12,.26) 60%, rgba(8,8,12,.54)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 2px #000;}
  .mini .mstats{ position:absolute; left:0; right:0; bottom:0; z-index:3; display:flex; justify-content:space-between; font-size:10px; font-weight:bold; padding:0 4px 2px; background:rgba(8,8,12,.52); text-shadow:0 1px 2px #000, 0 0 4px #000;}
  .mini .mcost{ position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #2a5a7a, #10222e); border:1px solid #3a7fa2; color:#d2f0ff;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; z-index:4; box-shadow:0 2px 6px rgba(0,0,0,.7);}

  /* ---------- Inspector (big card) ---------- */
  .inspector{ padding:12px; display:flex; justify-content:center; border-bottom:1px solid #23232f;}
  .bigcard{
    width:250px; height:352px; border-radius:12px; position:relative; overflow:hidden;
    border:1px solid #7a6228;
    background:linear-gradient(165deg,#1d1b24,#0d0c12 55%,#141119);
    box-shadow:0 12px 36px rgba(0,0,0,.8), 0 0 0 1px #08080c, 0 0 24px rgba(212,175,90,.10), inset 0 0 0 1px rgba(242,210,136,.25);
    display:flex; flex-direction:column;
  }
  .bigcard.holo::after{ content:""; position:absolute; inset:0; z-index:7; pointer-events:none; mix-blend-mode:screen;
    background:linear-gradient(115deg, transparent 32%, rgba(255,236,190,.15) 44%, rgba(140,210,255,.13) 50%, rgba(255,180,220,.11) 56%, transparent 68%);
    background-size:240% 240%; animation:sheen 3.4s linear infinite;}
  @keyframes sheen{ 0%{background-position:130% 0;} 100%{background-position:-70% 0;} }
  .bigcard .frame{ position:absolute; inset:5px; border:1px solid rgba(222,185,100,.55); border-radius:9px; pointer-events:none; z-index:5; box-shadow:inset 0 0 0 1px rgba(0,0,0,.65), inset 0 0 26px rgba(0,0,0,.5);}
  .bigcard .bart{ position:absolute; inset:0; z-index:0;}
  .bigcard .bbody{ position:relative; z-index:4; margin-top:148px; flex:1; min-height:0; display:flex; flex-direction:column;
    background:linear-gradient(180deg, transparent, rgba(9,8,13,.05) 40px, rgba(9,8,13,.34)); padding-top:10px; text-shadow:0 0 3px #000, 0 1px 3px #000, 0 0 12px rgba(0,0,0,.85);}
  /* full art: spells, arches, omegas, ascendants, gods — art fills the whole card, text floats on it */

<script>
"use strict";
/* =====================================================================
   REALM: Arena of Gods — digital prototype
   Single-file build: card data → art → engine → UI → bot
   ===================================================================== */

/* ============================ ART LIBRARY ============================ */
const DOM_COLORS = { war:"#e5543a", light:"#f0c22e", storm:"#35c3e8", wild:"#5abf5f", death:"#a05bd8", void:"#98a2b3", neutral:"#b08d57" };
const DOM_NAMES  = { war:"War", light:"Light", storm:"Storm", wild:"Wild", death:"Death", void:"Void", neutral:"Neutral" };

let _gid = 0;
function uid(){ return "g" + (++_gid); }

</svg></div>`;

function sigilBare(dom){
  const c = DOM_COLORS[dom];
  const m = {
    war:`<g stroke="${c}" stroke-width="2.4" fill="none"><path d="M8 24 L24 8 M8 8 L24 24"/><path d="M11 5 L5 11 M27 21 L21 27"/></g>`,
    light:`<circle cx="16" cy="16" r="10" fill="none" stroke="${c}" stroke-width="2"/>`,
    storm:`<path d="M18 4 L9 18 H15 L12 28 L23 13 H16 L20 4 Z" fill="${c}"/>`,
    wild:`<g stroke="${c}" stroke-width="2.4" fill="none"><path d="M8 26 Q10 14 7 7 Q13 12 12 26"/><path d="M15 26 Q17 12 15 5 Q21 11 19 26"/><path d="M22 26 Q24 15 22 9 Q27 13 26 26"/></g>`,
    death:`<circle cx="16" cy="14" r="8" fill="${c}"/>`,
    void:`<circle cx="16" cy="16" r="10" fill="none" stroke="${c}" stroke-width="2.4"/>`,
    neutral:`<path d="M10 26 V10 M16 26 V8 M22 26 V10 M8 26 H24" stroke="${c}" stroke-width="2.4" fill="none"/>`
  };
  return `<g transform="scale(1.6)">${m[dom]||""}</g>`;
}
function starfield(seedStr, glow){
  let h = 0; for (const ch of String(seedStr)) h = (h*31 + ch.charCodeAt(0)) % 9973;
  let out = "";
  for (let i=0;i<9;i++){
    h = (h*137+29) % 9973;
    const x = (h % 100), y = ((h>>2) % 46) + 2, r = 0.4 + (h % 3)*0.3, o = 0.2 + (h % 40)/100;
    const col = (h % 2) ? "#f2d288" : (glow || "#f2d288");
    const tw = i<3 ? `<animate attributeName="opacity" values="${o.toFixed(2)};${Math.min(1,o+0.5).toFixed(2)};${o.toFixed(2)}" dur="${(2+(h%30)/10).toFixed(1)}s" repeatCount="indefinite"/>` : "";
    out += `<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity="${o.toFixed(2)}">${tw}</circle>`;
  }
  return out;
}

/* ============================ ENGINE ============================ */
const COLS = 5, ROWS = 7, VERGE = 3;
const MAX_ESSENCE = 10, CMDS_PER_TURN = 4, START_HP = 30, HAND_START = 5, GLORY_ASCEND = 2;

let G = null;          // game state
let UIS = null;        // ui selection state

function mkPlayer(i, dk, isBot, name){
  const deck = [];
  for (const [cid, n] of Object.entries(dk.list)) for (let k=0;k<n;k++) deck.push(cid);
  shuffle(deck);
  return {
    i, name, isBot, deckKey: dk.key, god: CARDS[dk.god],
    hp: START_HP, essence: 0, cap: 0,
    deck, hand: [], fallen: [], gallery: [...dk.omegaGallery],
    cmds: 0, channeled: false, tookTurn: false,
    actUsed:false, awakened:false, awakenReady:false, awakeFx:null, ultUsed:false,
    souls:0, spellCast:false, teemingUsed:false, redHarvest:false, fullCharge:false,
    markedUid:null, banished:[], banked:0, cmdsMax:CMDS_PER_TURN, mulliganed: !!isBot, firstDawnDone:false,
  };
}
function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

let GAME_GEN = 0;
function newGame(mode, p0deck, p1deck, names){
  _gid = 0;
  BOT_BUSY = false;
  G = {
    gen: ++GAME_GEN,
    mode, over:false, winner:null, round:1, turn:0, // turn = player index
    grid: Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    glyphs: Array.from({length:ROWS},()=>Array(COLS).fill(null)),
    players: [ mkPlayer(0, p0deck, false, names[0]), mkPlayer(1, p1deck, mode==="bot", names[1]) ],
    log: [], firstTurnDone:[false,false], pendingAscends: [],
    terrain: (typeof ARENA_CHOICE!=="undefined" && ARENA_CHOICE && ARENA_CHOICE.t) ? ARENA_CHOICE.t.slice() : genVerge(),
    arenaName: (typeof ARENA_CHOICE!=="undefined" && ARENA_CHOICE) ? ARENA_CHOICE.name : "Random Arena",
  };
  for (const p of G.players) for (let k=0;k<HAND_START;k++) drawCard(p, true);
  // going second: +1 card
  drawCard(G.players[1], true);
  log(`⚔ The Arena awakens. ${G.players[0].name==="You" ? "You move" : G.players[0].name+" moves"} first.`, "hl");
  beginTurn();
}

function pRowBase(pi){ return pi===0 ? 0 : ROWS-1; }        // back row (absolute)
function pDir(pi){ return pi===0 ? 1 : -1; }                 // forward direction
function rowFromEdge(pi, row){ return pi===0 ? row : (ROWS-1-row); } // 0 = back row
function inCreatureZone(pi,row){ return rowFromEdge(pi,row) <= 1; }
function inArchZone(pi,row){ return rowFromEdge(pi,row) <= 2; }
function unitAt(c,r){ return (c<0||c>=COLS||r<0||r>=ROWS) ? undefined : G.grid[r][c]; }
function genVerge(){
  const t = Array(COLS).fill("plain");
  const idx = [0,1,2,3,4];
  for (let i=idx.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [idx[i],idx[j]]=[idx[j],idx[i]]; }
  let water=0;
  for (const c of idx){
    const r = Math.random();
    if (r<0.24 && water<2){ t[c]="water"; water++; }
    else if (r<0.40){ t[c]="ridge"; }
    else if (r<0.52){ t[c]="well"; }
  }
  let plains = t.filter(x=>x==="plain").length, i=0;
  while (plains<2 && i<COLS){ if (t[i]!=="plain"){ t[i]="plain"; plains++; } i++; }
  return t;
}
function terrainAt(c,r){ return (r===VERGE && G.terrain) ? G.terrain[c] : "plain"; }
function canStand(u, c, r){
  if (c<0||c>=COLS||r<0||r>=ROWS) return false;
  if (unitAt(c,r)) return false;
  if (terrainAt(c,r)==="water" && !hasKw(u,"flying") && !hasKw(u,"waterwalk")) return false;
  return true;
}

function drawCard(p, silent){
  if (p.deck.length === 0){
    if (!silent){ log(`${p.name}'s Soulwell is empty — the Realm has no more souls to send.`, "hl"); gameOver(1-p.i); }
    else { }
    return null;
  }
  const cid = p.deck.pop(); p.hand.push(cid);
  if (!INSTANT && typeof UIS!=="undefined" && UIS && typeof VIEWER!=="undefined" && VIEWER===p.i){
    (UIS.justDrawn || (UIS.justDrawn = new Set())).add(p.hand.length-1);
  }
  return cid;
}

function log(msg, cls){ G.log.push({msg, cls}); if (G.log.length>200) G.log.shift(); }

function curP(){ return G.players[G.turn]; }
function oppP(){ return G.players[1-G.turn]; }

function beginTurn(){
  const p = curP();
  sfx("turn"); AUDIO.updateIntensity();
  p.cap = Math.min(MAX_ESSENCE, p.cap+1);
  p.essence = p.cap;
  if (!p.firstDawnDone){ if (p.i===1){ p.essence = Math.min(MAX_ESSENCE, p.essence+1); log(`${p.name==="You"?"You seize":p.name+" seizes"} the initiative — +1 Essence for going second.`); } p.firstDawnDone = true; }
  p.cmds = CMDS_PER_TURN + (p.banked||0);
  p.cmdsMax = p.cmds;
  if (p.banked){ log(`${p.name} spends a banked Command (${p.cmds} this turn).`); p.banked = 0; }
  p.channeled = false;
  p.actUsed = false;
  p.spellCast = false; p.teemingUsed = false; p.redHarvest = false; p.fullCharge = false; p.markedUid = null;
  G.exileUsed = false;
  // unbind + reset unit actions
  for (const u of allUnits()){
    if (u.owner===p.i){ u.bound=false; u.marched=0; u.struck=false; u.justBlinked=false; u._tu={}; u.overwatch=false; }
  }
  fireTrigs("dawn", {owner:p.i});
  // banished creatures return, Bound
  if (p.banished.length){
    for (const cid of p.banished.splice(0)){
      const t = emptyDeployTile(p, CARDS[cid]);
      if (t){ const u = mkUnit(cid, p.i, t[0], t[1]); u.bound = true; G.grid[t[1]][t[0]] = u; log(`<b>${CARDS[cid].name}</b> returns from banishment, Bound.`); }
      else { p.hand.push(cid); log(`<b>${CARDS[cid].name}</b> finds no ground — it returns to your hand.`); }
    }
  }
  const wells = allUnits().filter(x=>x.owner===p.i && terrainAt(x.col,x.row)==="well").length;
  if (wells){ const g=Math.min(2,wells); p.essence=Math.min(MAX_ESSENCE,p.essence+g); log(`✦ Wellspring grants ${p.name} +${g} Essence.`, "hl"); }
  log(`— Round ${G.round} · ${p.name} · Dawn (Essence ${p.essence}) —`, "round");
  if (p.deck.length===0){ gameOver(1-p.i); return; }
  drawCard(p);
  const opp = G.players[1-p.i];
  if (p.hp <= opp.hp - 8){ if (p.deck.length) drawCard(p); p.essence = Math.min(MAX_ESSENCE, p.essence+1); log(`⚖ <b>Divine Favor</b> — behind by ${opp.hp-p.hp} Health, ${p.name==="You"?"you":p.name} gain a card and +1 Essence.`, "hl"); }
  G.pendingAscends = eligibleAscends(p);
}
function emptyDeployTile(p, cd){
  const arch = cd && cd.type==="arch";
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    if (unitAt(c,r) || r===VERGE) continue;
    if (arch ? inArchZone(p.i,r) : inCreatureZone(p.i,r)) return [c,r];
  }
  return null;
}

function eligibleAscends(p){
  return allUnits().filter(u => u.owner===p.i && !u.isArch && hasKw(u,"ascendant") && u.glory>=GLORY_ASCEND
    && CARDS[u.cardId].omega && p.gallery.includes(CARDS[u.cardId].omega));
}

function allUnits(){
  const out = [];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (G.grid[r][c]) out.push(G.grid[r][c]);
  return out;
}

function mkUnit(cardId, owner, c, r){
  const cd = CARDS[cardId];
  const godBonus = (cd.type==="arch" && G.players[owner].god.id==="godKaerok") ? 1 : 0;
  let ba = cd.atk||0, bh = (cd.hp||1)+godBonus;
  if (cd.soulScale){ const x = Math.max(5, Math.min(8, G.players[owner].souls)); ba = x; bh = x; }
  return {
    uid: uid(), cardId, owner, col:c, row:r,
    isArch: cd.type==="arch", token: !!cd.token,
    baseAtk: ba, baseHp: bh, dmg:0,
    bAtk:0, bHp:0, bSpd:0,
    equips: [], grantKw: [], glory:0, hardened:false,
    venom:0, rebornUsed:false, justBlinked:false, tempAtk:0, tempBreak:false, overwatch:false,
    bound: !((cd.kw||[]).includes("haste")), marched:0, struck:false,
  };
}
function friendlyHas(pi, flag){ return allUnits().some(u=>u.owner===pi && !u.isArch && CARDS[u.cardId][flag]); }
function colUnits(pi, col, flag){ return allUnits().filter(u=>u.owner===pi && u.col===col && CARDS[u.cardId][flag]).length; }
function atkOf(u){
  let a = u.baseAtk + u.bAtk + (u.tempAtk||0) + u.equips.reduce((s,e)=>s+(e.atk||0),0);
  const pl = G.players[u.owner];
  if (u.isArch && u.baseAtk===0 && pl.awakeFx==="crucible") a += 1;
  if (!u.isArch){
    if (hasKw(u,"phalanx")) a += allUnits().filter(t=>t.owner===u.owner && !t.isArch && adjacent(u,t)).length;
    if (pl.god.id==="godRend" && u.dmg>0) a += 1;          // Frenzy
    if (pl.god.id==="godToll" && pl.souls>=8) a += 1;      // The Toll — soul host
    if (pl.god.id==="godToll" && pl.souls>=16) a += 1;
    if (pl.redHarvest) a += 2;                              // Red Harvest
    if (u.token && friendlyHas(u.owner,"auraTokenAtk")) a += 1;
    a += colUnits(u.owner, u.col, "colAtk");               // banner columns
    if (atkType(u)!=="ranged" && terrainAt(u.col,u.row)==="ridge") a += 1;   // high ground melee
    const cnd = CARDS[u.cardId].cond; if (cnd && cnd.atk && condActive(u, cnd.when)) a += cnd.atk;
  }
  return Math.max(0,a);
}
function maxHpOf(u){
  let h = u.baseHp + u.bHp + u.equips.reduce((s,e)=>s+(e.hp||0),0);
  if (!u.isArch){
    if (u.token && friendlyHas(u.owner,"auraTokenHp")) h += 1;
    h += colUnits(u.owner, u.col, "colHp");
    if (G.players[u.owner].god.id==="godToll" && G.players[u.owner].souls>=16) h += 1;
    const cnd = CARDS[u.cardId].cond; if (cnd && cnd.hp && condActive(u, cnd.when)) h += cnd.hp;
  }
  return h;
}
function hpOf(u){ return maxHpOf(u) - u.dmg; }
function spdOf(u){
  const cd = CARDS[u.cardId];
  let s = (cd.spd||0) + u.bSpd + (u.tempSpd||0) + u.equips.reduce((e2,e)=>e2+(e.spd||0),0);
  const pl = G.players[u.owner];
  if (hasKw(u,"flying") && pl.god.id==="godZephyra") s += 1;   // Gale
  if (pl.god.id==="godSurge" && !hasKw(u,"heavy")) s += 1;      // Momentum
  s += colUnits(u.owner, u.col, "colSpd");
  return Math.max(0,s);
}
function hasKw(u, kw){
  if (nullSuppressed(u)) return false;
  if ((CARDS[u.cardId].kw||[]).includes(kw)) return true;
  if (u.grantKw && u.grantKw.includes(kw)) return true;
  const ck = CARDS[u.cardId].condKw;
  if (ck && ck.kw===kw && condActive(u, ck.when)) return true;
  return false;
}
function nullSuppressed(u){
  if (u.isArch) return false;
  for (let r=0;r<ROWS;r++){ const a=G.grid[r][u.col]; if (a && a.isArch && a.owner!==u.owner && CARDS[a.cardId].nullField) return true; }
  return false;
}
function effPiercing(u){
  return hasKw(u,"piercing") || G.players[u.owner].redHarvest || (u.justBlinked && G.players[u.owner].god.id==="godVenge");
}
function effBreak(u){ return hasKw(u,"breakthrough") || u.tempBreak || G.players[u.owner].fullCharge; }
function rangeOf(u){
  let base = (u.isArch && u.baseAtk===0 && G.players[u.owner].awakeFx==="crucible") ? 2 : (CARDS[u.cardId].range || 1);
  if (!u.isArch && base>1 && terrainAt(u.col,u.row)==="ridge") base += 1;   // high ground
  return base;
}
function isRanged(u){ return (CARDS[u.cardId].range||0) > 1; }

/* ---------- deployment ---------- */
function legalDeployTiles(p, cardId){
  const cd = CARDS[cardId], out=[];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    if (unitAt(c,r)) continue;
    if (r===VERGE) continue;
    if (cd.type==="creature" && inCreatureZone(p.i,r)) out.push([c,r]);
    if (cd.type==="arch" && inArchZone(p.i,r)) out.push([c,r]);
  }
  return out;
}
function deploy(p, handIdx, c, r){
  const cid = p.hand[handIdx], cd = CARDS[cid];
  p.essence -= cd.cost;
  p.hand.splice(handIdx,1);
  const u = mkUnit(cid, p.i, c, r);
  G.grid[r][c] = u;
  log(`${p.name} deploys <b>${cd.name}</b>.`);
  sfx("deploy");
  applyAutoDeploy(p, cd, u);
  fireTrigs("allyDeploy", {unit:u});
  return u;
}
const AUTO_DEPLOY = new Set(["gainSouls","summonToken","selfDrawDamage","drawIfSpell","healMostDamaged","returnFallenHand","returnFallenBound","healGod","lure"]);
function applyAutoDeploy(p, cd, u){
  const d = cd.deploy; if (!d || !AUTO_DEPLOY.has(d.kind)) return;
  if (d.kind==="gainSouls"){ p.souls += d.n; log(`…gains ${d.n} Soul.`); }
  else if (d.kind==="summonToken"){ for (let i=0;i<d.n;i++) summonTokenAuto(p, d.token); log(`…summons ${d.n} ${CARDS[d.token].name}${d.n>1?"s":""}.`); }
  else if (d.kind==="selfDrawDamage"){ u.dmg += d.n; drawCard(p); log(`…bleeds and draws.`); if (hpOf(u)<=0) destroyUnit(u,null); }
  else if (d.kind==="drawIfSpell"){ if (p.spellCast){ drawCard(p); log(`…the seams part, draw a card.`); } }
  else if (d.kind==="healMostDamaged"){ const t = allUnits().filter(x=>x.owner===p.i && !x.isArch && x.dmg>0).sort((a,b)=>b.dmg-a.dmg)[0]; if (t){ t.dmg=Math.max(0,t.dmg-d.n); fxFloat(tileEl(t.col,t.row),"+"+d.n,"#5abf5f"); log(`…mends <b>${CARDS[t.cardId].name}</b>.`);} }
  else if (d.kind==="healGod"){ p.hp=p.hp+d.n; fxFloat(godPlateEl(p.i),"+"+d.n,"#5abf5f"); log(`…restores ${d.n} to ${p.name}'s God.`); }
  else if (d.kind==="returnFallenHand"){ returnFallenToHand(p); }
  else if (d.kind==="returnFallenBound"){ returnFallenToField(p,1); }
  else if (d.kind==="lure"){ doLure(p, u); }
}
function fallenCreatures(p){ return p.fallen.filter(cid=>{const t=CARDS[cid].type; return t==="creature";}); }
function humanActing(p){ return G && !BOT_BUSY && !INSTANT && VIEWER===p.i && !p.isBot; }
function returnFallenToHand(p){
  const cr = fallenCreatures(p); if (!cr.length){ log(`…the Fallen are silent — no creature to reclaim.`, "hl"); return; }
  if (humanActing(p)){ UIS.fallenPick = {mode:"hand", count:1, taken:0}; return; }
  cr.sort((a,b)=>CARDS[b].cost-CARDS[a].cost); const cid = cr[0];
  p.fallen.splice(p.fallen.indexOf(cid),1); p.hand.push(cid);
  log(`…<b>${CARDS[cid].name}</b> returns to hand.`);
}
function returnFallenToField(p, count){
  const cr = fallenCreatures(p); if (!cr.length){ log(`…the Fallen are silent — none could return.`, "hl"); return; }
  if (humanActing(p)){ UIS.fallenPick = {mode:"field", count, taken:0}; return; }
  cr.sort((a,b)=>CARDS[b].cost-CARDS[a].cost);
  let done=0;
  for (const cid of cr){ if (done>=count) break; const t=emptyDeployTile(p,CARDS[cid]); if (!t) break;
    p.fallen.splice(p.fallen.indexOf(cid),1); const u=mkUnit(cid,p.i,t[0],t[1]); u.bound = true; G.grid[t[1]][t[0]]=u; done++;
    log(`…<b>${CARDS[cid].name}</b> rises from the Fallen, Bound.`); }
  if (!done) log(`…none could return.`);
}
function resolveFallenPick(cid){
  const p = curP(); const fp = UIS.fallenPick; if (!fp) return;
  const idx = p.fallen.indexOf(cid); if (idx<0) return;
  if (fp.mode==="hand"){
    p.fallen.splice(idx,1); p.hand.push(cid);
    log(`…<b>${CARDS[cid].name}</b> returns to your hand.`, "hl");
    UIS.fallenPick = null;
  } else {
    const t = emptyDeployTile(p, CARDS[cid]);
    p.fallen.splice(idx,1);
    if (t){ const u = mkUnit(cid,p.i,t[0],t[1]); u.bound = true; G.grid[t[1]][t[0]] = u; fxFloat(tileEl(t[0],t[1]), "⟲", "#c98cf0"); log(`…<b>${CARDS[cid].name}</b> rises from the Fallen, Bound.`, "hl"); }
    else { p.hand.push(cid); log(`…<b>${CARDS[cid].name}</b> finds no ground — it returns to your hand.`, "hl"); }
    fp.taken++;
    if (fp.taken >= fp.count || fallenCreatures(p).length===0) UIS.fallenPick = null;
  }
  resetSelKeepInspect(); renderAll();
}
function doLure(p, u){
  // pull nearest enemy creature 1 tile toward u along a straight line into an empty tile
  const enemies = allUnits().filter(t=>t.owner!==p.i && !t.isArch).sort((a,b)=>dist(u.col,u.row,a.col,a.row)-dist(u.col,u.row,b.col,b.row));
  for (const t of enemies){
    if (!canBeForced(t)) continue;
    const dc=Math.sign(u.col-t.col), dr=Math.sign(u.row-t.row);
    // only straight (one axis)
    let nc=t.col, nr=t.row;
    if (t.col!==u.col && t.row===u.row) nc=t.col+dc;
    else if (t.row!==u.row && t.col===u.col) nr=t.row+dr;
    else continue;
    if (canStand(t,nc,nr)){ moveUnit(t,nc,nr); log(`…<b>Lure</b> drags <b>${CARDS[t.cardId].name}</b> forward.`); return; }
  }
}

function glyphTiles(p){
  const out=[];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    if (r===VERGE || !inArchZone(p.i,r)) continue;
    if (G.glyphs[r][c]) continue;
    out.push([c,r]);
  }
  return out;
}
function placeGlyph(p, handIdx, c, r){
  const cid = p.hand[handIdx];
  p.essence -= CARDS[cid].cost;
  p.hand.splice(handIdx,1);
  G.glyphs[r][c] = {cardId:cid, owner:p.i};
  log(`${p.name==="You"?"You place":p.name+" places"} a hidden Glyph.`, "hl");
}

/* ---------- movement ---------- */
function reachableTiles(u){
  const spd = spdOf(u); if (spd<=0) return [];
  if (hasKw(u,"blink")){
    const out=[];
    for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
      if ((c===u.col&&r===u.row) || unitAt(c,r)) continue;
      if (terrainAt(c,r)==="water" && !hasKw(u,"flying") && !hasKw(u,"waterwalk")) continue;
      if (dist(u.col,u.row,c,r) <= spd) out.push([c,r]);
    }
    return out;
  }
  const fly = hasKw(u,"flying");
  const lateral = fly || hasKw(u,"sidestep");
  const seen = new Set([u.col+","+u.row]);
  let frontier = [[u.col,u.row]];
  const out = [];
  for (let step=0; step<spd; step++){
    const next = [];
    for (const [c,r] of frontier){
      const dirs = lateral ? [[0,1],[0,-1],[1,0],[-1,0]] : [[0,1],[0,-1]];
      for (const [dc,dr] of dirs){
        const nc=c+dc, nr=r+dr;
        if (nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
        const key = nc+","+nr;
        if (seen.has(key)) continue;
        const occ = unitAt(nc,nr);
        if (occ){
          const passable = fly
            || (occ.owner===u.owner && !occ.isArch)                                   // pass through friendly creatures
            || (occ.isArch && hasKw(occ,"passable") && occ.owner===u.owner && !u.isArch); // own Gate
          if (passable){ seen.add(key); next.push([nc,nr]); }
          continue;
        }
        if (terrainAt(nc,nr)==="water" && !fly && !hasKw(u,"waterwalk")){ seen.add(key); continue; }   // water blocks ground/ranged
        seen.add(key); next.push([nc,nr]); out.push([nc,nr]);
      }
    }
    frontier = next;
  }
  return out;
}
function march(u, c, r){
  const blinked = hasKw(u,"blink");
  u.marched++;
  if (blinked) u.justBlinked = true;
  curP().cmds--;
  log(`${CARDS[u.cardId].name} ${blinked?"blinks":"marches"}.`);
  moveUnit(u, c, r);
  if (allUnits().includes(u)) fireTrigs("selfMarch", {unit:u});
}
function moveUnit(u, c, r){ G.grid[u.row][u.col]=null; u.col=c; u.row=r; G.grid[r][c]=u; settleUnit(u); }
function settleUnit(u){
  // 1. glyph beneath?
  const g = G.glyphs[u.row] && G.glyphs[u.row][u.col];
  if (g && g.owner!==u.owner && !u.isArch){
    G.glyphs[u.row][u.col] = null;
    const gc = CARDS[g.cardId];
    log(`◈ A hidden Glyph is revealed — <b>${gc.name}</b>!`, "hl");
    toast("GLYPH!");
    if (g.cardId==="pitfall"){ dealDamage(u, 3, null, "#e5a13a"); }
    else if (g.cardId==="snareglyph"){ u.bound = true; fxFloat(tileEl(u.col,u.row), "⛓", "#e5a13a"); log(`<b>${CARDS[u.cardId].name}</b> is snared — Bound.`, "combat"); }
    else if (g.cardId==="shatterglyph"){
      const adj = allUnits().filter(t=>t.owner===u.owner && !t.isArch && t.uid!==u.uid && adjacent(u,t));
      dealDamage(u, 2, null, "#e5a13a");
      for (const a of adj) dealDamage(a, 1, null, "#e5a13a");
    }
    else if (g.cardId==="falseglyph"){ const gp=G.players[g.owner]; if (gp.deck.length) drawCard(gp); log(`…nothing happens. ${gp.name} draws, smiling.`, "hl"); }
    if (!allUnits().includes(u)) return;   // died to the trap
  }
  // 2. overwatch volleys
  for (const w of allUnits().slice()){
    if (!w.overwatch || w.owner===u.owner || w.isArch) continue;
    if (!allUnits().includes(u)) return;
    if (canStrike(w, u) || dist(w.col,w.row,u.col,u.row)===1){
      w.overwatch = false;
      log(`⌖ <b>${CARDS[w.cardId].name}</b> fires on Overwatch! (braced +1)`, "combat");
      strike(w, u, {free:true, bonus:1});
    }
  }
}

/* ---------- combat ---------- */
function adjacent(a, b){ return Math.abs(a.col-b.col)+Math.abs(a.row-b.row) === 1; }
function lineClear(c1,r1,c2,r2){
  if (c1!==c2 && r1!==r2) return false;
  const dc = Math.sign(c2-c1), dr = Math.sign(r2-r1);
  let c=c1+dc, r=r1+dr;
  while (c!==c2 || r!==r2){ if (unitAt(c,r)) return false; c+=dc; r+=dr; }
  return true;
}
function dist(c1,r1,c2,r2){ return Math.abs(c1-c2)+Math.abs(r1-r2); }

function atkType(u){
  if (hasKw(u,"flying")) return "flying";
  if ((CARDS[u.cardId].range||0) > 1 || (u.isArch && u.baseAtk===0 && G.players[u.owner].awakeFx==="crucible")) return "ranged";
  return "ground";
}
function canBeForced(t){ return !hasKw(t,"heavy"); }   // Heavy can't be shoved
// Combat triangle: can attacker u legally Strike defender t (ignoring Guard)?
function canStrike(u, t){
  if (t.owner===u.owner) return false;
  const at = atkType(u), tflying = hasKw(t,"flying");
  const d = dist(u.col,u.row,t.col,t.row);
  if (at==="ground")  return d===1 && !tflying;         // ground melee — can't touch fliers
  if (at==="flying")  return d===1;                     // flying melee — hits anything adjacent
  // ranged
  const R = rangeOf(u), straight = (u.col===t.col || u.row===t.row);
  if (tflying){
    if (d===1) return true;                             // point-blank anti-air allowed
    return d<=R && straight && (lineClear(u.col,u.row,t.col,t.row) || hasKw(u,"skywatch"));
  }
  return d>=2 && d<=R && straight && lineClear(u.col,u.row,t.col,t.row);   // no point-blank vs ground
}
function legalStrikeTargets(u){
  if (u.struck || u.bound) return {units:[], god:false};
  let out = allUnits().filter(t => canStrike(u, t));
  // Guard: if adjacent enemy Guards are legally targetable, must hit them first
  const guards = out.filter(t => hasKw(t,"guard") && adjacent(u,t));
  if (guards.length) out = guards;
  // God strike
  let god = false;
  if (!guards.length && !u.isArch){
    const at = atkType(u), enemy = 1-u.owner;
    if (at==="ground" || at==="flying"){ god = (u.row===pRowBase(enemy)); }
    else {
      const R = rangeOf(u), d = rowFromEdge(enemy, u.row) + 1;
      if (d<=R){
        let clear = true; const dr = enemy===0 ? -1 : 1;
        for (let r=u.row+dr; enemy===0? r>=0 : r<ROWS; r+=dr){ if (unitAt(u.col,r)){ clear=false; break; } }
        god = clear;
      }
    }
  }
  return {units:out, god};
}

function strikeDamage(u, target){
  let dmg = atkOf(u);
  if (CARDS[u.cardId].bonusVsDamaged && target.dmg>0) dmg += CARDS[u.cardId].bonusVsDamaged;
  if (G.players[u.owner].markedUid===target.uid) dmg += 2;   // Venge Mark
  return dmg;
}
function strike(u, target, opts){ // target = unit or "god"
  const p = G.players[u.owner], e = G.players[1-u.owner];
  u.struck = true; if (!(opts && opts.free)) p.cmds--;
  const cd = CARDS[u.cardId];
  sfx(target === "god" ? "godHit" : "strike");
  if (target === "god"){
    const dmg = atkOf(u);
    e.hp -= dmg;
    fxFloat(godPlateEl(1-u.owner), "-"+dmg, "#e5543a");
    log(`<b>${cd.name}</b> strikes ${e.name}'s God for ${dmg}!`, "combat");
    u.glory++;
    fxFloat(tileEl(u.col,u.row), "+1 ✦", "#f2d288");
    if (!hasKw(u,"ascendant") && u.glory>=GLORY_ASCEND && !u.hardened){ u.hardened=true; u.bAtk++; u.bHp++; log(`<b>${cd.name}</b> is Battle-Hardened: +1/+1.`, "hl"); }
    maybeAscendNow(u);
    if (e.hp>0 && e.hp<15 && !e.awakenReady){ e.awakenReady = true; log(`☀ ${e.god.name} is wounded — the AWAKENING unlocks!`, "hl"); }
    if (e.hp<=0) gameOver(u.owner);
    return;
  }
  const tcd = CARDS[target.cardId];
  if (target.isArch && cd.id==="kaedusOmega"){
    log(`<b>${cd.name}</b> shatters <b>${tcd.name}</b> outright!`, "combat");
    destroyUnit(target, u);
    return;
  }
  if (hasKw(u,"venom")){ target.venom = Math.min(3,(target.venom||0)+1); fxFloat(tileEl(target.col,target.row), "☣", "#5abf5f"); }
  const dmg = strikeDamage(u, target) + ((opts&&opts.bonus)||0);
  const hpBefore = hpOf(target);
  target.dmg += dmg;
  fxFloat(tileEl(target.col,target.row), "-"+dmg, "#e5543a");
  log(`<b>${cd.name}</b> strikes <b>${tcd.name}</b> for ${dmg}.`, "combat");
  // thorns
  if (CARDS[target.cardId].thorns){ u.dmg += CARDS[target.cardId].thorns; fxFloat(tileEl(u.col,u.row), "-"+CARDS[target.cardId].thorns, "#5abf5f"); }
  let died = false;
  if (hpOf(target)<=0){
    // Breakthrough: carry excess behind target
    if (effBreak(u) && (u.col===target.col || u.row===target.row) && dist(u.col,u.row,target.col,target.row)===1){
      const excess = dmg - hpBefore;
      if (excess>0){
        const dc = Math.sign(target.col-u.col), dr = Math.sign(target.row-u.row);
        const bc = target.col+dc, br = target.row+dr;
        if (br<0 || br>=ROWS){ // off the enemy edge -> the God
          const enemy = 1-u.owner;
          if ((enemy===0 && br<0) || (enemy===1 && br>=ROWS)){
            e.hp -= excess; fxFloat(godPlateEl(enemy), "-"+excess, "#e5543a");
            log(`…<b>Breakthrough</b> carries ${excess} to ${e.name}'s God!`, "combat");
            if (e.hp>0 && e.hp<15 && !e.awakenReady){ e.awakenReady=true; log(`☀ ${e.god.name} is wounded — the AWAKENING unlocks!`,"hl"); }
            if (e.hp<=0){ destroyUnit(target,u); gameOver(u.owner); return; }
          }
        } else {
          const behind = unitAt(bc,br);
          if (behind){ behind.dmg += excess; fxFloat(tileEl(bc,br), "-"+excess, "#e5543a"); log(`…<b>Breakthrough</b> carries ${excess} to <b>${CARDS[behind.cardId].name}</b>!`, "combat"); }
        }
      }
    }
    destroyUnit(target, u); died = true;
  }
  if (!died && !target.isArch) fireTrigs("selfSurvive", {unit:target});
  if (!died && !target.isArch && !effPiercing(u)){
    if (canStrike(target, u)){
      const rdmg = strikeDamage(target, u);
      u.dmg += rdmg;
      fxFloat(tileEl(u.col,u.row), "-"+rdmg, "#f2a35a");
      log(`<b>${tcd.name}</b> retaliates for ${rdmg}.`, "combat");
      if (hpOf(u)<=0) destroyUnit(u, target);
    }
  }
}

function summonToken(p, tokenId, c, r){
  const u = mkUnit(tokenId, p.i, c, r); G.grid[r][c] = u;
  return u;
}
function summonTokenAuto(p, tokenId){
  const t = emptyDeployTile(p, CARDS[tokenId]);
  if (t){ const u = summonToken(p, tokenId, t[0], t[1]); fxFloat(tileEl(t[0],t[1]), "+"+CARDS[tokenId].name, "#5abf5f"); return u; }
  return null;
}
function exileUnit(u){ destroyUnit(u, null, {exile:true}); }
function banishUnit(u){
  const owner = G.players[u.owner];
  fxDissolve(u, "#98a2b3");
  G.grid[u.row][u.col] = null;
  if (!u.token) owner.banished.push(u.cardId);
  log(`<b>${CARDS[u.cardId].name}</b> is banished from the Arena.`, "combat");
}
function dealDamage(u, n, killer, color){
  u.dmg += n; fxFloat(tileEl(u.col,u.row), "-"+n, color||"#a05bd8");
  if (hpOf(u)<=0) destroyUnit(u, killer||null);
  return hpOf(u)<=0;
}
function destroyUnit(u, killer, opts){
  if (!G.grid[u.row] || G.grid[u.row][u.col]!==u){ /* already gone */ }
  fxDissolve(u, opts && opts.exile ? "#c98cf0" : "#ff8a5a");
  G.grid[u.row][u.col] = null;
  const cd = CARDS[u.cardId];
  const p = G.players[u.owner];
  // exile? (forced, or Sentence's Reckoning on first enemy death)
  let exiled = !!(opts && opts.exile);
  const sp = G.players.find(pl=>pl.god.id==="godSentence");
  if (!exiled && sp && u.owner!==sp.i && !G.exileUsed && !u.token){
    exiled = true; G.exileUsed = true; log(`⚖ <b>The Reckoning</b> exiles <b>${cd.name}</b>.`, "hl");
  }
  log(exiled ? `<b>${cd.name}</b> is exiled.` : `<b>${cd.name}</b> falls.`, "combat");
  // Souls: any death feeds every Toll — but exiled souls escape the ledger
  if (!exiled) for (const pl of G.players) if (pl.god.id==="godToll"){ pl.souls++; }
  // Bloodbound Hound: allies gain ATK when a friendly creature dies (not on exile)
  if (!exiled && !u.isArch) for (const t of allUnits()) if (t.owner===u.owner && CARDS[t.cardId].onAllyDeathAtk){ t.bAtk += CARDS[t.cardId].onAllyDeathAtk; }
  // Teeming: Blight replaces its fallen with Spawnlings
  if (!exiled && !u.isArch && !u.token){
    const bp = G.players.find(pl=>pl.god.id==="godBlight");
    if (bp && u.owner===bp.i && G.turn===bp.i && !bp.teemingUsed){ if (summonTokenAuto(bp, "spawnling")){ bp.teemingUsed = true; log(`<b>Teeming</b> — a Spawnling crawls up.`); } }
  }
  // killer rewards
  if (killer && !killer.isArch && !u.isArch && killer.owner!==u.owner){
    killer.glory++;
    fxFloat(tileEl(killer.col,killer.row), "+1 ✦", "#f2d288");
    const kcd = CARDS[killer.cardId];
    log(`<b>${kcd.name}</b> earns Glory (${killer.glory}).`, "hl");
    if (CARDS[killer.cardId].soulOnKill){ G.players[killer.owner].souls += CARDS[killer.cardId].soulOnKill; }
    if (CARDS[killer.cardId].drawOnKill){ drawCard(G.players[killer.owner]); log(`<b>${kcd.name}</b> feeds — its owner draws.`); }
    if (!hasKw(killer,"ascendant") && killer.glory>=GLORY_ASCEND && !killer.hardened){
      killer.hardened = true; killer.bAtk++; killer.bHp++;
      log(`<b>${kcd.name}</b> is Battle-Hardened: +1/+1.`, "hl");
    }
    maybeAscendNow(killer);
  }
  // Reborn
  if (!exiled && hasKw(u,"reborn") && !u.rebornUsed){
    let t = null;
    for (let rr=0; rr<ROWS && !t; rr++){ if (rr!==VERGE && inCreatureZone(u.owner,rr) && !unitAt(u.col,rr) && terrainAt(u.col,rr)!=="water") t=[u.col,rr]; }
    if (!t) t = emptyDeployTile(p, cd);
    if (t){ const nu = mkUnit(u.cardId, u.owner, t[0], t[1]); nu.rebornUsed = true; nu.dmg = Math.max(0, maxHpOf(nu)-1);
      G.grid[t[1]][t[0]] = nu;
      fxFloat(tileEl(t[0],t[1]), "⟲ REBORN", "#c98cf0");
      log(`⟲ <b>${cd.name}</b> is <b>REBORN</b> — it returns to your lines at 1 HP, Bound.`, "hl");
      return; }
  }
  if (!exiled){
    fireTrigs(u.isArch ? "allyArchDeath" : "allyDeath", {unit:u});
    if (!u.isArch) fireTrigs("enemyDeath", {unit:u});
  }
  if (killer && !u.isArch) fireTrigs("selfKill", {unit:u, killer});
  if (exiled) fireTrigs("enemyExiled", {unit:u});
  const dr = CARDS[u.cardId].death;
  if (dr && !exiled) applyDeathRattle(u, dr);
  if (!exiled && !u.token) p.fallen.push(u.cardId);
}
function applyDeathRattle(u, dr){
  const p = G.players[u.owner];
  const nm = CARDS[u.cardId].name;
  if (dr.kind==="dealAdjacent"){
    const vic = allUnits().filter(t=>t.owner!==u.owner && !t.isArch && dist(u.col,u.row,t.col,t.row)===1);
    for (const v of vic){ v.dmg+=dr.n; fxFloat(tileEl(v.col,v.row),"-"+dr.n,"#ff7a45"); }
    log(`<b>${nm}</b> detonates — ${dr.n} to adjacent foes.`, "combat");
    for (const v of vic.slice()) if (hpOf(v)<=0) destroyUnit(v, null);
  }
  else if (dr.kind==="summonToken"){ for(let i=0;i<dr.n;i++) summonTokenAuto(p, dr.token); log(`<b>${nm}</b> falls — ${dr.n} ${CARDS[dr.token].name}${dr.n>1?"s":""} rise.`,"hl"); }
  else if (dr.kind==="healGod"){ p.hp=p.hp+dr.n; fxFloat(godPlateEl(p.i),"+"+dr.n,"#5abf5f"); log(`<b>${nm}</b> — its passing heals the God ${dr.n}.`,"hl"); }
  else if (dr.kind==="draw"){ if (p.deck.length) drawCard(p); log(`<b>${nm}</b> — a final report: draw a card.`); }
  else if (dr.kind==="buffAllies"){ for (const t of allUnits()) if (t.owner===u.owner && !t.isArch && t.uid!==u.uid){ t.bAtk+=dr.atk||0; t.bHp+=dr.hp||0; } log(`<b>${nm}</b> — the fallen inspire the living (+${dr.atk||0}/+${dr.hp||0}).`,"hl"); }
  else if (dr.kind==="gainSouls"){ p.souls+=dr.n; }
}

/* ---------- trigger engine (intricate card abilities) ---------- */
function fireTrigs(kind, d){
  for (const L of allUnits().slice()){
    const trigs = CARDS[L.cardId].trig; if (!trigs) continue;
    if (nullSuppressed(L)) continue;
    for (let i=0;i<trigs.length;i++){
      const t = trigs[i];
      if (t.on!==kind) continue;
      if (!trigMatch(L, t, d)) continue;
      if (t.once){ L._tu = L._tu||{}; if (L._tu[kind+i]) continue; L._tu[kind+i]=1; }
      runTrigEffect(L, t.do, d);
    }
  }
}
function trigMatch(L, t, d){
  switch(t.on){
    case "allyDeath": return d.unit && !d.unit.isArch && d.unit.owner===L.owner && d.unit.uid!==L.uid;
    case "allyArchDeath": return d.unit && d.unit.isArch && d.unit.owner===L.owner;
    case "enemyDeath": if (!(d.unit && !d.unit.isArch && d.unit.owner!==L.owner)) return false;
      if (t.venomOnly && !(d.unit.venom>0)) return false; return true;
    case "enemyExiled": return d.unit && d.unit.owner!==L.owner;
    case "selfKill": return d.killer && d.killer.uid===L.uid;
    case "selfSurvive": return d.unit && d.unit.uid===L.uid;
    case "spellCast": return d.owner===L.owner;
    case "allyDeploy": return d.unit && !d.unit.isArch && d.unit.owner===L.owner && d.unit.uid!==L.uid;
    case "selfMarch": return d.unit && d.unit.uid===L.uid;
    case "dawn": return d.owner===L.owner;
  }
  return false;
}
function runTrigEffect(L, eff, d){
  const p = G.players[L.owner]; const nm = CARDS[L.cardId].name;
  switch(eff.kind){
    case "buffSelf": L.bAtk+=eff.atk||0; L.bHp+=eff.hp||0; fxFloat(tileEl(L.col,L.row), `+${eff.atk||0}/+${eff.hp||0}`, "#5abf5f"); break;
    case "tempAtkSelf": L.tempAtk=(L.tempAtk||0)+eff.n; fxFloat(tileEl(L.col,L.row), "+"+eff.n+"⚡", "#35c3e8"); break;
    case "healSelf": if (L.dmg>0){ L.dmg=Math.max(0,L.dmg-eff.n); fxFloat(tileEl(L.col,L.row), "+"+eff.n, "#5abf5f"); } break;
    case "draw": if (p.deck.length) drawCard(p); break;
    case "gainSouls": p.souls+=eff.n; break;
    case "healGod": p.hp=p.hp+eff.n; fxFloat(godPlateEl(p.i),"+"+eff.n,"#5abf5f"); break;
    case "essence": p.essence=Math.min(MAX_ESSENCE,p.essence+eff.n); break;
    case "summonToken": for (let i=0;i<(eff.n||1);i++) summonTokenAuto(p, eff.token); break;
    case "damageNearest": { const e=allUnits().filter(t=>t.owner!==L.owner&&!t.isArch).sort((a,b)=>dist(L.col,L.row,a.col,a.row)-dist(L.col,L.row,b.col,b.row))[0]; if (e) dealDamage(e,eff.n,null,"#ff7a45"); break; }
    case "healAllies": for (const t of allUnits()) if (t.owner===L.owner&&!t.isArch&&t.dmg>0) t.dmg=Math.max(0,t.dmg-eff.n); break;
    case "buffAdjAllies": for (const t of allUnits()) if (t.owner===L.owner&&!t.isArch&&t.uid!==L.uid&&adjacent(L,t)){ t.bAtk+=eff.atk||0; t.bHp+=eff.hp||0; } break;
    case "refreshSelf": L.marched=0; L.struck=false; fxFloat(tileEl(L.col,L.row), "↻", "#35c3e8"); break;
  }
  if (eff.log) log(`<b>${nm}</b> — ${eff.log}`, "hl");
}
function condActive(u, when){
  const p = G.players[u.owner];
  switch(when){
    case "adjArch": return allUnits().some(t=>t.owner===u.owner&&t.isArch&&adjacent(u,t));
    case "onRidge": return terrainAt(u.col,u.row)==="ridge";
    case "vergeBeyond": return rowFromEdge(u.owner,u.row)>=VERGE;
    case "souls4": return p.souls>=4;
    case "wounded": return u.dmg>0;
    case "alone": return !allUnits().some(t=>t.owner===u.owner&&!t.isArch&&t.uid!==u.uid&&adjacent(u,t));
    case "escort": return allUnits().some(t=>t.owner===u.owner&&!t.isArch&&t.uid!==u.uid&&adjacent(u,t));
    case "controlTower": return allUnits().some(t=>t.owner===u.owner&&t.isArch&&CARDS[t.cardId].range);
    case "fallen6": return p.fallen.length>=6;
  }
  return false;
}

/* ---------- spells / artifacts ---------- */
function spellTargets(p, cid){
  const cd = CARDS[cid];
  const t = cd.target;
  if (t==="none") return {units:[], none:true};
  const list = allUnits().filter(u=>{
    if (t==="anyArch") return u.isArch;
    if (u.isArch) return false;
    let ok=false;
    if (t==="anyCreature") ok=true;
    else if (t==="friendCreature"||t==="friendUnit") ok = u.owner===p.i;
    else if (t==="enemyCreature") ok = u.owner!==p.i;
    if (ok && cd.thpMax!=null) ok = hpOf(u)<=cd.thpMax;
    return ok;
  });
  return {units:list, none:false};
}
function spellCost(p, cd){
  let c = cd.cost;
  if (p.god.id==="godRift" && !p.spellCast) c = Math.max(0, c-1);   // Feedback
  return c;
}
function castSpell(p, handIdx, target){
  const cid = p.hand[handIdx], cd = CARDS[cid];
  p.essence -= spellCost(p, cd); p.spellCast = true; p.hand.splice(handIdx,1); p.fallen.push(cid);
  log(`${p.name} casts <b>${cd.name}</b>.`, "hl");
  sfx("spell");
  if (target && target.col!=null) fxRing(tileEl(target.col,target.row), DOM_COLORS[cd.domain] || "#f2d288");
  const eff = cd.effect || (cd.id==="soulbolt" ? {kind:"damage", n:2} : cd.id==="sunder" ? {kind:"destroyArch"} : null);
  applyEffect(p, eff, target);
  fireTrigs("spellCast", {owner:p.i});
}
function controlsBlink(p){ return allUnits().some(u=>u.owner===p.i && !u.isArch && hasKw(u,"blink")); }
function applyEffect(p, eff, target){
  if (!eff) return;
  switch(eff.kind){
    case "damage": {
      const before = hpOf(target);
      target.dmg += eff.n; fxFloat(tileEl(target.col,target.row), "-"+eff.n, "#a05bd8");
      const dead = hpOf(target)<=0;
      if (dead) destroyUnit(target, null);
      if (eff.healOnKill && before>0 && dead){ p.hp=p.hp+eff.healOnKill; fxFloat(godPlateEl(p.i),"+"+eff.healOnKill,"#5abf5f"); }
      if (eff.selfGod){ p.hp-=eff.selfGod; fxFloat(godPlateEl(p.i),"-"+eff.selfGod,"#e5543a"); if (p.hp<=0) gameOver(1-p.i); }
      break;
    }
    case "destroyArch": destroyUnit(target, null); break;
    case "healGod": { p.hp=p.hp+eff.n; fxFloat(godPlateEl(p.i),"+"+eff.n,"#5abf5f"); log(`\u2600 The Light restores ${eff.n} to ${p.name}'s God${p.hp>START_HP?` \u2014 now ${p.hp}, past full!`:"."}`, "hl"); break; }
    case "buff": target.bAtk+=eff.atk; target.bHp+=eff.hp; fxFloat(tileEl(target.col,target.row), "+"+eff.atk+"/+"+eff.hp, "#5abf5f"); if (eff.draw && p.deck.length) drawCard(p); break;
    case "buffColumn": {
      const col = target.col; let n=0;
      for (const u of allUnits()) if (u.owner===p.i && !u.isArch && u.col===col){ u.bAtk+=eff.atk; u.bHp+=eff.hp; fxFloat(tileEl(u.col,u.row),"+"+eff.atk+"/+"+eff.hp,"#5abf5f"); n++; }
      log(`…the lane blooms (${n}).`);
      break;
    }
    case "aoeEnemies": {
      const vic = allUnits().filter(u=>u.owner!==p.i && !u.isArch);
      const before = vic.map(v=>hpOf(v));
      for (const v of vic){ v.dmg += eff.n; fxFloat(tileEl(v.col,v.row), "-"+eff.n, "#35c3e8"); }
      let kills=0;
      for (let i=0;i<vic.length;i++){ if (before[i]>0 && hpOf(vic[i])<=0){ destroyUnit(vic[i], null); kills++; } }
      if (eff.summonPerKill) for (let i=0;i<kills;i++) summonTokenAuto(p, eff.summonPerKill);
      break;
    }
    case "freeMove": UIS.freeMove = {unit:target, n:eff.n}; break;
    case "exile": exileUnit(target); break;
    case "damageExile": { const before=hpOf(target); target.dmg+=eff.n; fxFloat(tileEl(target.col,target.row),"-"+eff.n,"#a05bd8"); if (before>0 && hpOf(target)<=0) destroyUnit(target,null,{exile:true}); break; }
    case "banish": banishUnit(target); break;
    case "damageDisplace": {
      const before=hpOf(target); target.dmg+=eff.n; fxFloat(tileEl(target.col,target.row),"-"+eff.n,"#98a2b3");
      if (before>0 && hpOf(target)<=0){ destroyUnit(target,null); break; }
      if (!canBeForced(target)) break;
      // push toward its own edge if possible, else any empty neighbor
      const dr = target.owner===0 ? -1 : 1;
      const cands = [[target.col,target.row+dr],[target.col+1,target.row],[target.col-1,target.row],[target.col,target.row-dr]];
      for (const [nc,nr] of cands){ if (canStand(target,nc,nr)){ moveUnit(target,nc,nr); break; } }
      break;
    }
    case "sacrificeBuff": {
      const cands = allUnits().filter(x=>x.owner===p.i && !x.isArch && x.uid!==target.uid);
      if (humanActing(p) && cands.length){ UIS.sacBuff = { targetUid: target.uid, atk: eff.atk, hp: eff.hp }; break; }
      const sac = cands.sort((a,b)=>(atkOf(a)+hpOf(a))-(atkOf(b)+hpOf(b)))[0];
      if (sac){ log(`…sacrifices <b>${CARDS[sac.cardId].name}</b>.`); destroyUnit(sac, null); }
      target.bAtk+=eff.atk; target.bHp+=eff.hp; target.tempBreak=true;
      fxFloat(tileEl(target.col,target.row),"+"+eff.atk+"/+"+eff.hp,"#e5543a");
      break;
    }
    case "tempCharge": { target.tempAtk += eff.atk; target.tempBreak = true; fxFloat(tileEl(target.col,target.row),"+"+eff.atk+" ⚡","#35c3e8"); break; }
    case "precision": { const n = controlsBlink(p)? eff.n2 : eff.n; target.dmg+=n; fxFloat(tileEl(target.col,target.row),"-"+n,"#e5543a"); if (hpOf(target)<=0) destroyUnit(target,null); break; }
    case "refreshTwo": {
      const mine = allUnits().filter(u=>u.owner===p.i && !u.isArch && !u.bound);
      if (humanActing(p) && mine.length){ UIS.refreshPick = { left: Math.min(2, mine.length) }; break; }
      const sorted = mine.sort((a,b)=>rowFromEdge(1-p.i,a.row)-rowFromEdge(1-p.i,b.row));
      let n=0; for (const u of sorted){ if (n>=2) break; u.marched=0; n++; }
      log(`…${n} answer the trumpet.`);
      break;
    }
    case "returnFallenHand": returnFallenToHand(p); break;
    case "returnFallenBound": returnFallenToField(p, 1); break;
  }
}
function equipArtifact(p, handIdx, target){
  const cid = p.hand[handIdx], cd = CARDS[cid];
  p.essence -= cd.cost; p.hand.splice(handIdx,1);
  target.equips.push({name:cd.name, atk:cd.effect.atk||0, hp:cd.effect.hp||0, spd:cd.effect.spd||0});
  if (cd.effect.kw) for (const k of cd.effect.kw){ if (!target.grantKw.includes(k)) target.grantKw.push(k); }
  log(`${p.name} equips <b>${cd.name}</b> on <b>${CARDS[target.cardId].name}</b>.`);
}

/* deploy effects */
function deployEffectTargets(p, cd){
  if (!cd.deploy) return null;
  const k = cd.deploy.kind;
  if (k==="healUnit") return allUnits().filter(u=>u.owner===p.i && u.dmg>0);
  if (k==="buffUnit") return allUnits().filter(u=>u.owner===p.i && !u.isArch);
  if (k==="damageCreature") return allUnits().filter(u=>!u.isArch);
  if (k==="exileWeak") return allUnits().filter(u=>!u.isArch && hpOf(u)<=(cd.deploy.n||1));
  if (k==="sacrificeDamage") return allUnits().filter(u=>u.owner!==p.i && !u.isArch);
  return null;
}
function applyDeployEffect(p, cd, target){
  const d = cd.deploy;
  if (!d || !target) return;
  if (d.kind==="healUnit"){ target.dmg = Math.max(0, target.dmg-d.n); fxFloat(tileEl(target.col,target.row), "+"+d.n, "#5abf5f"); log(`…restoring ${d.n} HP to <b>${CARDS[target.cardId].name}</b>.`);}
  else if (d.kind==="buffUnit"){ target.bAtk+=d.atk; target.bHp+=d.hp; fxFloat(tileEl(target.col,target.row), "+1/+1", "#5abf5f"); log(`…empowering <b>${CARDS[target.cardId].name}</b>.`);}
  else if (d.kind==="damageCreature"){ dealDamage(target, d.n, null, "#35c3e8"); log(`…scorching a creature.`); }
  else if (d.kind==="exileWeak"){ log(`…<b>${CARDS[target.cardId].name}</b> is exiled.`); exileUnit(target); }
  else if (d.kind==="sacrificeDamage"){ dealDamage(target, d.n, null, "#e5543a"); }
}

/* ---------- ascension ---------- */
function maybeAscendNow(u){
  if (!u || u.isArch || G.turn!==u.owner) return;
  if (!hasKw(u,"ascendant") || u.glory < GLORY_ASCEND) return;
  const om = CARDS[u.cardId].omega, p = G.players[u.owner];
  if (om && p.gallery.includes(om) && allUnits().includes(u)) ascend(u);
}
function ascend(u){
  const p = G.players[u.owner];
  const omegaId = CARDS[u.cardId].omega;
  const gi = p.gallery.indexOf(omegaId);
  if (gi<0) return;
  p.gallery.splice(gi,1);
  const cd = CARDS[omegaId];
  const nu = mkUnit(omegaId, u.owner, u.col, u.row);
  nu.bound = false; nu.glory = 0;
  G.grid[u.row][u.col] = nu;
  log(`✦ <b>${CARDS[u.cardId].name}</b> ASCENDS — <b>${cd.name}</b> enters the Arena! ✦`, "hl");
  toast("ASCENSION");
  sfx("ascend"); AUDIO.bump(0.5);
  if (cd.onAscend){
    const oa = cd.onAscend;
    if (oa.kind==="crossNova"){
      const vic = allUnits().filter(t=>t.owner!==u.owner && !t.isArch && (t.col===nu.col || t.row===nu.row));
      const bf = vic.map(v=>hpOf(v));
      for (const v of vic){ v.dmg += oa.n; fxFloat(tileEl(v.col,v.row), "-"+oa.n, "#35c3e8"); }
      for (let i=0;i<vic.length;i++) if (bf[i]>0 && hpOf(vic[i])<=0) destroyUnit(vic[i], nu);
    } else if (oa.kind==="refreshAllMarch"){
      for (const t of allUnits()) if (t.owner===u.owner && !t.isArch) t.marched=0;
      log(`…the whole field surges forward again.`);
    } else if (oa.kind==="destroyWeakEnemy"){
      const elig = allUnits().filter(t=>t.owner!==u.owner && !t.isArch && hpOf(t)<=oa.n);
      if (humanActing(p) && elig.length){ UIS.ascendKill = { n: oa.n, srcUid: nu.uid }; }
      else { const e = elig.sort((a,b)=>hpOf(b)-hpOf(a))[0];
        if (e){ log(`…<b>${CARDS[e.cardId].name}</b> is struck down.`); destroyUnit(e, nu); } }
    }
  }
  G.pendingAscends = eligibleAscends(p);
}

/* ---------- god powers ---------- */
function performAwaken(p){
  if (!p.awakenReady || p.awakened) return false;
  p.awakened = true;
  sfx("awaken"); AUDIO.bump(0.35);
  const aw = p.god.awaken, id = p.god.id;
  const enemies = ()=>allUnits().filter(t=>t.owner!==p.i && !t.isArch);
  if (id==="godKaerok"){ p.awakeFx = "crucible"; }
  else if (id==="godZephyra"){
    const vic=enemies(); const bf=vic.map(v=>hpOf(v));
    for (const v of vic){ v.dmg+=1; fxFloat(tileEl(v.col,v.row),"-1","#35c3e8"); }
    for (let i=0;i<vic.length;i++) if (bf[i]>0 && hpOf(vic[i])<=0) destroyUnit(vic[i],null);
    for (const f of allUnits()) if (f.owner===p.i && !f.isArch && hasKw(f,"flying")) f.marched=0;
  }
  else if (id==="godToll"){ returnFallenToField(p, 2); }
  else if (id==="godRend"){ p.redHarvest = true; }
  else if (id==="godRift"){
    for (const e of enemies()){ if(!canBeForced(e)) continue; const dr=e.owner===0?-1:1; if (canStand(e,e.col,e.row+dr)) moveUnit(e,e.col,e.row+dr); }
    for (const f of allUnits()) if (f.owner===p.i && !f.isArch) f.marched=0;
  }
  else if (id==="godBloom"){ for (const t of allUnits()) if (t.owner===p.i && !t.isArch){ t.dmg=0; t.bHp+=1; } }
  else if (id==="godSurge"){ p.fullCharge=true; for (const f of allUnits()) if (f.owner===p.i && !f.isArch) f.marched=0; }
  else if (id==="godSentence"){ for (const t of allUnits().slice()) if (!t.isArch && hpOf(t)<=3) exileUnit(t); }
  else if (id==="godBlight"){ for (const e of enemies()) e.venom=Math.min(3,(e.venom||0)+1); }
  else if (id==="godVenge"){

/* ---------- turn end / dusk ---------- */
function endTurn(){
  const p = curP();
  // Dusk Volley — ranged creatures loose their held shots automatically
  for (const u of allUnits().slice()){
    if (G.over) break;
    if (u.owner!==p.i || u.isArch || u.bound || u.struck || u.overwatch) continue;
    if (atkType(u)!=="ranged" || atkOf(u)<=0) continue;
    const st = legalStrikeTargets(u);
    if (!st.units.length) continue;
    const t = st.units.sort((a,b)=>dist(u.col,u.row,a.col,a.row)-dist(u.col,u.row,b.col,b.row))[0];
    log(`\ud83c\udff9 Dusk Volley — <b>${CARDS[u.cardId].name}</b> looses its shot.`, "combat");
    strike(u, t, {free:true});
  }
  if (G.over) return;
  // dusk effects (this player's units)
  for (const u of allUnits().slice()){
    if (u.owner!==p.i) continue;
    const cd = CARDS[u.cardId]; const dk = cd.dusk; if (!dk) continue;
    if (dk.kind==="healGod"){ p.hp=p.hp+dk.n; log(`<b>${cd.name}</b> restores ${dk.n} to ${p.name}'s God.`); }
    else if (dk.kind==="healRadius"){ for (const t of allUnits()) if (t.owner===p.i && !t.isArch && t.dmg>0 && dist(u.col,u.row,t.col,t.row)<=dk.r) t.dmg=Math.max(0,t.dmg-dk.n); log(`<b>${cd.name}</b> mends the grove.`); }
    else if (dk.kind==="gainSouls"){ p.souls+=dk.n; log(`<b>${cd.name}</b> gathers ${dk.n} Soul.`); }
    else if (dk.kind==="healAllFriendly"){ for (const t of allUnits()) if (t.owner===p.i && !t.isArch && t.dmg>0) t.dmg=Math.max(0,t.dmg-dk.n); if (dk.spawnSapling) summonTokenAuto(p,"sapling"); log(`<b>${cd.name}</b> blooms.`); }
    else if (dk.kind==="venomNearest"){ const e=allUnits().filter(t=>t.owner!==p.i && !t.isArch).sort((a,b)=>dist(u.col,u.row,a.col,a.row)-dist(u.col,u.row,b.col,b.row))[0]; if (e){ e.venom=Math.min(3,(e.venom||0)+1); fxFloat(tileEl(e.col,e.row),"☣","#5abf5f"); log(`<b>${cd.name}</b> festers a wound.`);} }
    else if (dk.kind==="pushNearest"){ const e=allUnits().filter(t=>t.owner!==p.i && !t.isArch && canBeForced(t)).sort((a,b)=>dist(u.col,u.row,a.col,a.row)-dist(u.col,u.row,b.col,b.row))[0]; if (e){ const dr=e.owner===0?-1:1; if (canStand(e,e.col,e.row+dr)){ moveUnit(e,e.col,e.row+dr); log(`<b>${cd.name}</b> shoves an intruder back.`);} } }
    else if (dk.kind==="exileWeakest"){ const e=allUnits().filter(t=>t.owner!==p.i && !t.isArch).sort((a,b)=>hpOf(a)-hpOf(b))[0]; if (e){ log(`<b>${cd.name}</b> passes sentence.`); exileUnit(e);} }
  }
  // Bloom — Verdant March
  if (p.god.id==="godBloom"){ for (const t of allUnits()) if (t.owner===p.i && !t.isArch && t.dmg>0 && rowFromEdge(p.i,t.row)>=VERGE){ t.dmg=Math.max(0,t.dmg-1); } }
  // Venom tick (every Dusk, all poisoned creatures)
  for (const u of allUnits().slice()){ if (u.venom>0 && !u.isArch){ u.dmg+=u.venom; fxFloat(tileEl(u.col,u.row),"-"+u.venom+"☣","#5abf5f"); if (hpOf(u)<=0) destroyUnit(u,null); } }
  // clear this-turn buffs
  p.redHarvest=false; p.fullCharge=false; p.markedUid=null;
  for (const u of allUnits()){ if (u.owner===p.i){ u.tempAtk=0; u.tempBreak=false; u.tempSpd=0; u.justBlinked=false; } }
  if (G.over) return;
  const myCr = allUnits().filter(u=>u.owner===p.i && !u.isArch).length;
  const oppCr = allUnits().filter(u=>u.owner!==p.i && !u.isArch).length;
  if (p.cmds>0 && myCr < oppCr){ p.banked = 1; log(`${p.name==="You"?"You bank":p.name+" banks"} a Command (outnumbered — planning the counter).`); }
  if (G.turn===1) G.round++;
  G.turn = 1-G.turn;
  beginTurn();
}

/* ---------- online play: peer-to-peer duels ---------- */
const NET = {
  peer:null, conn:null, role:null, seat:0, code:"", status:"", dropped:false, _t:null, chat:[],
  cfg(){ return (typeof window!=="undefined" && window.REALM_NET_CONFIG) || {}; },
  online(){ return MODE==="online" && !!this.conn; },
  setStatus(html){ this.status = html; const el=$("#netStatus"); if (el) el.innerHTML = html; },
  newCode(){ const A="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let s=""; for (let i=0;i<5;i++) s+=A[Math.floor(Math.random()*A.length)]; return s; },
  mkPeer(id){
    const base = { debug:0, config:{ iceServers:[ {urls:"stun:stun.l.google.com:19302"}, {urls:"stun:global.stun.twilio.com:3478"} ] } };
    const o = Object.assign(base, this.cfg());
    return id ? new Peer(id, o) : new Peer(o);
  },
  reset(){ try{ if (this.peer) this.peer.destroy(); }catch(e){} this.peer=null; this.conn=null; this.role=null; this.dropped=false; },
  ready(){ if (typeof Peer==="undefined"){ this.setStatus("Online play needs an internet connection \u2014 the network library could not load. Reconnect and reopen the game."); return false; } return true; },
  hostLobby(){
    if (!this.ready()) return;
    this.reset();
    this.role="host"; this.code=this.newCode();
    this.setStatus("Opening the Arena gates\u2026");
    this.peer = this.mkPeer("realm-arena-"+this.code);
    this.peer.on("open", ()=> this.setStatus(`Match code: <b>${this.code}</b><br>Your friend opens this same game, clicks <i>Online</i>, enters the code, and hits Join. Keep this screen open\u2026`));
    this.peer.on("connection", c=>{ if (this.conn){ try{ c.close(); }catch(e){} return; } this.bind(c); this.setStatus("Challenger found \u2014 forging the Arena\u2026"); });
    this.peer.on("error", e=> this.netError(e));
    this.peer.on("disconnected", ()=>{ try{ this.peer.reconnect(); }catch(e){} });
  },
  joinLobby(code){
    if (!this.ready()) return;
    code = (code||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
    if (code.length!==5){ this.setStatus("Enter the 5-letter match code shown on your friend's screen."); return; }
    this.reset();
    this.role="guest"; this.code=code;
    this.setStatus("Seeking the host\u2026");
    this.peer = this.mkPeer(null);
    this.peer.on("open", ()=>{
      const c = this.peer.connect("realm-arena-"+code, {reliable:true});
      this.bind(c);
    });
    this.peer.on("error", e=> this.netError(e));
  },
  bind(c){
    this.conn = c;
    c.on("open", ()=>{
      if (this.role==="guest"){
        const dk = deckByKey(MENU.deck);
        try{ c.send({ type:"hello", name:((MENU.netName||"").trim().slice(0,14)) || "Challenger",
          deck:{ key:dk.key, name:dk.name, god:dk.god, list:dk.list, omegaGallery:dk.omegaGallery } }); }catch(e){}
        this.setStatus("Connected \u2014 waiting for the host's Arena\u2026");
      }
    });
    c.on("data", d=> this.onData(d));
    c.on("close", ()=> this.onDrop());
    c.on("error", ()=> this.onDrop());
  },
  sanitizeDeck(dk){
    dk = dk || {};
    const list = {};
    if (dk.list) for (const cid of Object.keys(dk.list)){ const n = dk.list[cid]; if (CARDS[cid] && n>0) list[cid] = Math.min(6, n|0); }
    if (!Object.keys(list).length) return deckByKey("crucible");
    const god = (dk.god && CARDS[dk.god] && CARDS[dk.god].type==="god") ? dk.god : "godKaerok";
    const gal = Array.isArray(dk.omegaGallery) ? dk.omegaGallery.filter(id=>CARDS[id]) : [];
    return { key: String(dk.key||"remote"), name: String(dk.name||"Remote Legion"), god, list, omegaGallery: gal };
  },
  onData(d){
    if (!d || typeof d!=="object") return;
    if (d.type==="hello" && this.role==="host" && !G){
      MODE = "online"; this.seat = 0; VIEWER = 0; this.dropped=false;
      ARENA_CHOICE = ARENAS.find(a=>a.key===MENU.arena) || ARENAS[0];
      newGame("online", deckByKey(MENU.deck), this.sanitizeDeck(d.deck),
        [ ((MENU.netName||"").trim().slice(0,14)) || "Host", d.name || "Challenger" ]);
      G.hideHands = false; G.seq = 1;
      try{ this.conn.send({ type:"start", state:this.snap() }); }catch(e){}
      resetSel(); renderAll(); toast("THE DUEL BEGINS");
    }
    else if (d.type==="start" && this.role==="guest"){
      MODE = "online"; this.seat = 1; VIEWER = 1; this.dropped=false;
      this.applySnap(d.state); toast("THE DUEL BEGINS");
    }
    else if (d.type==="state"){
      if (G && (d.seq||0) > (G.seq||0)) this.applySnap(d.state);
    }
    else if (d.type==="ultfx"){ if (typeof ultCinematic==="function" && CARDS[d.g]) ultCinematic(CARDS[d.g]); }
    else if (d.type==="chat"){ this.addChat(d.name, d.text, false); }
    else if (d.type==="bye"){ this.conn=null; this.onDrop(true); }
  },
  snap(){
    const st = Object.assign({}, G);
    st.players = G.players.map(p=> Object.assign({}, p, {god:p.god.id}));
    st.pendingAscends = null;
    st.pendingAscendUids = (G.pendingAscends||[]).filter(u=>u&&u.uid).map(u=>u.uid);
    st._gid = _gid;
    st.log = G.log.slice(-120);
    return JSON.parse(JSON.stringify(st));
  },
  applySnap(st){
    if (!st || !st.players) return;
    const _oldHand = (G && G.players && G.players[this.seat]) ? G.players[this.seat].hand.length : -1;
    _gid = Math.max(_gid, st._gid||0);
    st.players.forEach(pp=> pp.god = CARDS[pp.god] || CARDS.godKaerok);
    G = st;
    const uids = new Set(st.pendingAscendUids||[]);
    G.pendingAscends = allUnits().filter(u=>uids.has(u.uid));
    if (_oldHand>=0 && G.players[this.seat] && G.players[this.seat].hand.length>_oldHand){
      UIS.justDrawn = UIS.justDrawn || new Set();
      for (let i=_oldHand; i<G.players[this.seat].hand.length; i++) UIS.justDrawn.add(i);
    }
    UIS.sacBuff=null; UIS.refreshPick=null; UIS.ascendKill=null; UIS.fallenPick=null; UIS.ultVenge=null; UIS.mullSel = new Set();
    resetSel();
    renderAll();
    AUDIO.updateIntensity();
  },
  onRender(){
    if (!this.online() || !G) return;
    if (G.turn!==this.seat && !G.over) return;
    clearTimeout(this._t);
    this._t = setTimeout(()=> this.pushState(), 40);
  },
  pushState(){
    if (!this.online() || !G) return;
    G.seq = (G.seq||0) + 1;
    try{ this.conn.send({ type:"state", seq:G.seq, state:this.snap() }); }catch(e){}
  },
  netError(e){
    const t = e && e.type;
    if (t==="peer-unavailable") this.setStatus(`No open match for code <b>${this.code}</b>. Check the letters \u2014 and the host must keep their game open.`);
    else if (t==="unavailable-id") this.setStatus("That code is taken \u2014 click Create Match again for a fresh one.");
    else this.setStatus("Network trouble ("+(t||"unknown")+"). Both players need internet \u2014 try again in a moment.");
  },
  onDrop(){
    this.conn = null;
    if (G && MODE==="online" && !G.over){ this.dropped = true; renderAll(); }
    else this.setStatus("Connection closed.");
  },
  leave(){
    try{ if (this.conn) this.conn.send({type:"bye"}); }catch(e){}
    const pr = this.peer;
    setTimeout(()=>{ try{ pr && pr.destroy(); }catch(e){} }, 200);
    this.peer=null; this.conn=null; this.role=null; this.dropped=false; this.status="";
    this.chat=[]; const cc=document.getElementById("netChat"); if (cc) cc.remove();
  },
  addChat(name, text, mine){ this.chat.push({name:String(name||"?").slice(0,14), text:String(text||"").slice(0,240), mine:!!mine}); if (this.chat.length>200) this.chat.shift(); if (typeof renderChat==="function") renderChat(); if (!mine && typeof sfx==="function") sfx("click"); },
  sendChat(text){ text=String(text||"").trim().slice(0,240); if (!text) return; const me=(G&&G.players[this.seat])?G.players[this.seat].name:"You"; this.addChat(me, text, true); try{ if (this.conn) this.conn.send({type:"chat", name:me, text}); }catch(e){} },
};
